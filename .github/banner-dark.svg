<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007aff" />
      <stop offset="50%" style="stop-color:#34c759" />
      <stop offset="100%" style="stop-color:#ff9500" />
    </linearGradient>
    <linearGradient id="icon-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007aff" />
      <stop offset="100%" style="stop-color:#34c759" />
    </linearGradient>
  </defs>

  <rect width="700" height="180" rx="12" fill="url(#bg)" />
  <rect x="0" y="0" width="700" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Knowledge graph icon — interconnected nodes -->
  <g transform="translate(55, 30)">
    <!-- Links -->
    <line x1="45" y1="20" x2="80" y2="48" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.3"/>
    <line x1="45" y1="20" x2="18" y2="52" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.3"/>
    <line x1="45" y1="20" x2="50" y2="58" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.25"/>
    <line x1="80" y1="48" x2="50" y2="58" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.25"/>
    <line x1="18" y1="52" x2="50" y2="58" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.25"/>
    <line x1="50" y1="58" x2="28" y2="88" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.3"/>
    <line x1="50" y1="58" x2="72" y2="90" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.3"/>
    <line x1="80" y1="48" x2="72" y2="90" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.25"/>
    <line x1="18" y1="52" x2="28" y2="88" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.25"/>
    <line x1="28" y1="88" x2="72" y2="90" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.2"/>
    <line x1="80" y1="48" x2="95" y2="75" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.2"/>
    <line x1="18" y1="52" x2="2" y2="78" stroke="url(#icon-fill)" stroke-width="1.2" opacity="0.2"/>

    <!-- Outer glow circles -->
    <circle cx="50" cy="58" r="16" fill="url(#icon-fill)" opacity="0.04"/>
    <circle cx="50" cy="58" r="30" fill="url(#icon-fill)" opacity="0.02"/>

    <!-- Nodes — center large -->
    <circle cx="50" cy="58" r="6" fill="#007aff" opacity="0.15"/>
    <circle cx="50" cy="58" r="3" fill="#007aff" opacity="0.8"/>

    <!-- Top node -->
    <circle cx="45" cy="20" r="4.5" fill="#34c759" opacity="0.12"/>
    <circle cx="45" cy="20" r="2.2" fill="#34c759" opacity="0.75"/>

    <!-- Right node -->
    <circle cx="80" cy="48" r="4" fill="#ff9500" opacity="0.12"/>
    <circle cx="80" cy="48" r="2" fill="#ff9500" opacity="0.75"/>

    <!-- Left node -->
    <circle cx="18" cy="52" r="4" fill="#f472b6" opacity="0.12"/>
    <circle cx="18" cy="52" r="2" fill="#f472b6" opacity="0.75"/>

    <!-- Bottom-left node -->
    <circle cx="28" cy="88" r="4.5" fill="#a78bfa" opacity="0.12"/>
    <circle cx="28" cy="88" r="2.2" fill="#a78bfa" opacity="0.75"/>

    <!-- Bottom-right node -->
    <circle cx="72" cy="90" r="4" fill="#60a5fa" opacity="0.12"/>
    <circle cx="72" cy="90" r="2" fill="#60a5fa" opacity="0.75"/>

    <!-- Leaf nodes -->
    <circle cx="95" cy="75" r="3" fill="#fbbf24" opacity="0.1"/>
    <circle cx="95" cy="75" r="1.5" fill="#fbbf24" opacity="0.65"/>

    <circle cx="2" cy="78" r="3" fill="#22d3ee" opacity="0.1"/>
    <circle cx="2" cy="78" r="1.5" fill="#22d3ee" opacity="0.65"/>
  </g>

  <!-- Title -->
  <text x="170" y="62" font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#f0f6fc" letter-spacing="-0.5">
    AI/ML Knowledge Graph
  </text>

  <!-- Subtitle -->
  <text x="170" y="90" font-family="'SF Pro Text', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" fill="#8b949e" letter-spacing="0.2">
    Interactive encyclopedia — from GPU architecture to prompt injection
  </text>

  <!-- Badges -->
  <g transform="translate(170, 110)">
    <rect x="0" y="0" width="82" height="26" rx="13" fill="#007aff" opacity="0.12" stroke="#007aff" stroke-width="1" stroke-opacity="0.3"/>
    <text x="41" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#007aff" text-anchor="middle" font-weight="600">132 terms</text>

    <rect x="94" y="0" width="76" height="26" rx="13" fill="#34c759" opacity="0.12" stroke="#34c759" stroke-width="1" stroke-opacity="0.3"/>
    <text x="132" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#34c759" text-anchor="middle" font-weight="600">531 rels</text>

    <rect x="182" y="0" width="98" height="26" rx="13" fill="#ff9500" opacity="0.12" stroke="#ff9500" stroke-width="1" stroke-opacity="0.3"/>
    <text x="231" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ff9500" text-anchor="middle" font-weight="600">11 categories</text>

    <rect x="292" y="0" width="88" height="26" rx="13" fill="#ff3b30" opacity="0.12" stroke="#ff3b30" stroke-width="1" stroke-opacity="0.3"/>
    <text x="336" y="17" font-family="'SF Mono', 'Cascadia Code', monospace" font-size="11" fill="#ff3b30" text-anchor="middle" font-weight="600">6 languages</text>
  </g>
</svg>
