name: Validate Data

on:
  pull_request:
    paths:
      - 'data/**'
      - 'scripts/validate.ts'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Validate YAML data
        run: bun run scripts/validate.ts

      - name: Test build
        run: bun run build.ts
