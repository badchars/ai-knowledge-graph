tips:
  - tr: Kritik bilgiler için LLM çıktısını external source'larla cross-check edin.
    en: Cross-check LLM output with external sources for critical information.
  - tr: URL'leri kullanmadan önce erişilebilirlik kontrolü yapın.
    en: Verify URL accessibility before using them.
  - tr: Her LLM response'una uncertainty disclaimer ekleyin.
    en: Add uncertainty disclaimer to every LLM response.
