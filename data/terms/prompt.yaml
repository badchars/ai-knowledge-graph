tips:
  - tr: User prompt ile system prompt'u kesinlikle ayırın; concatenation yerine chat template kullanın.
    en: Strictly separate user prompts from system prompts; use chat templates instead of concatenation.
  - tr: Prompt length limit koyun (max 2000-4000 token) ve rate limiting uygulayın.
    en: Set prompt length limits (max 2000-4000 tokens) and apply rate limiting.
  - tr: Şüpheli prompt pattern'larını gerçek zamanlı tespit edin ve block edin.
    en: Detect and block suspicious prompt patterns in real-time.
