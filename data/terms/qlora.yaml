    authors: Zhang, Li, et al.
tips:
  - tr: Hugging Face Hub'dan indirdiğin QLoRA adapter'larını production'a almadan önce mutlaka checksum doğrulaması yap — adapter poisoning saldırıları yaygın hale geliyor.
    en: Always perform checksum validation on QLoRA adapters downloaded from Hugging Face Hub before moving to production — adapter poisoning attacks are becoming common.
  - tr: QLoRA ile fine-tune ederken lora_dropout parametresini 0.05-0.1 arasında tut — çok düşük dropout overfitting riskini artırır ve backdoor embedding'i kolaylaştırır.
    en: When fine-tuning with QLoRA, keep lora_dropout between 0.05-0.1 — too low dropout increases overfitting risk and facilitates backdoor embedding.
  - tr: Multi-tenant GPU ortamında QLoRA eğitimi yapıyorsan, mutlaka cgroup memory isolation kullan — paged optimizer swap pattern'leri timing side-channel saldırısına açık.
    en: If training QLoRA in multi-tenant GPU environment, always use cgroup memory isolation — paged optimizer swap patterns are vulnerable to timing side-channel attacks.
