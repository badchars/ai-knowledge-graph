tips:
  - tr: ICL examples'ı validate edin, malicious patterns için regex check yapın.
    en: Validate ICL examples, check for malicious patterns with regex.
  - tr: Examples ile user input arasına clear delimiter koyun (=== gibi).
    en: Put clear delimiter between examples and user input (like ===).
  - tr: Model output'u sanitize edin, fake example injection attempt'lerini filtreleyin.
    en: Sanitize model output, filter fake example injection attempts.
