tips:
  - tr: System prompt'u application code'da hardcode edin, config file'dan okumayın.
    en: Hardcode system prompt in application code, don't read from config files.
  - tr: System prompt'a user data eklerken mutlaka escape edin ve validation yapın.
    en: Always escape and validate when adding user data to system prompts.
  - tr: Farklı risk seviyelerinde farklı system prompt'lar kullanın (public vs authenticated).
    en: Use different system prompts for different risk levels (public vs authenticated).
