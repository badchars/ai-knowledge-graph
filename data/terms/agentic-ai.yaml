tips:
  - tr: Goal validation ile malicious intent'leri erken tespit edin, regex blacklist kullanın.
    en: Detect malicious intents early with goal validation, use regex blacklist.
  - tr: Tool execution'da whitelist yaklaşımı kullanın, tehlikeli toolları hiç expose etmeyin.
    en: Use whitelist approach for tool execution, never expose dangerous tools.
  - tr: Her iteration'ı audit için detaylı loglayın, timestamp ve reasoning dahil.
    en: Log every iteration in detail for audit, including timestamp and reasoning.
