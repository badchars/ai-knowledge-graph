tips:
  - tr: HuggingFace'den LoRA adapter indirirken mutlaka download count ve author verify edin.
    en: When downloading LoRA adapter from HuggingFace, always verify download count and author.
  - tr: Proprietary LoRA adapter'ları şifreleyerek saklayın, weight extraction'ı önleyin.
    en: Store proprietary LoRA adapters encrypted to prevent weight extraction.
  - tr: Adapter merge sonrası safety evaluation tekrarlayın, jailbreak check yapın.
    en: Repeat safety evaluation after adapter merge, check for jailbreak.
