  - title: Explaining and Harnessing Adversarial Examples
    url: https://arxiv.org/abs/1412.6572
    year: 2014
    type: paper
    authors: Ian Goodfellow, Jonathon Shlens, Christian Szegedy
  - title: Towards Deep Learning Models Resistant to Adversarial Attacks
    url: https://arxiv.org/abs/1706.06083
    year: 2017
    type: paper
    authors: Aleksander Madry, Aleksandar Makelov, Ludwig Schmidt
  - title: Certified Adversarial Robustness via Randomized Smoothing
    url: https://arxiv.org/abs/1902.02918
    year: 2019
    type: paper
    authors: Jeremy Cohen, Elan Rosenfeld, Zico Kolter
tips:
  - tr: Adversarial eğitim yaparken epsilon değerini aşamalı olarak artırın (curriculum learning). Başta küçük pertürbasyonlarla başlayıp modeli zorlayarak daha güçlü savunma mekanizması oluşturun.
    en: When performing adversarial training, gradually increase epsilon value (curriculum learning). Start with small perturbations and challenge the model to build stronger defense mechanisms.
  - tr: "Production ortamında ensemble savunma kullanın: adversarial training + input preprocessing + randomized smoothing kombinasyonu tek başına her yöntemden daha etkilidir."
    en: "Use ensemble defense in production: combination of adversarial training + input preprocessing + randomized smoothing is more effective than any single method alone."
  - tr: Model API'niz üzerinde gradient masking yapmayın - bu yanlış güvenlik hissi verir. Saldırganlar gradient-free saldırılar (black-box) ile yine de başarılı olabilir.
    en: Don't use gradient masking on your model API - this provides false sense of security. Attackers can still succeed with gradient-free attacks (black-box).
