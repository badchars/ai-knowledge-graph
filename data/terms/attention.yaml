tips:
  - tr: Shared inference ortamlarında mutlaka KV cache'i her request sonrası temizleyin, prompt sızıntısı kritik risktir.
    en: Always clear KV cache after each request in shared inference environments - prompt leakage is critical risk.
  - tr: Attention pattern'lerini log'lamayın, training data membership inference saldırılarına açık olursunuz.
    en: Don't log attention patterns - they expose you to training data membership inference attacks.
  - tr: Multi-head attention'da farklı head'lerin çıktılarını randomize edin, pattern-based side-channel'ları önleyin.
    en: Randomize outputs from different attention heads to prevent pattern-based side-channels.
