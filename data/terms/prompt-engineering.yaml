tips:
  - tr: User input'u prompt template'e eklerken escape edin, injection pattern'larını filtreleyin.
    en: Escape user input when adding to prompt template, filter injection patterns.
  - tr: System prompt'u XML tags (<system></system>) ile user input'tan ayırın.
    en: Separate system prompt from user input with XML tags (<system></system>).
  - tr: LLM output'u validate edin, system prompt leak attempt'lerini tespit edin.
    en: Validate LLM output, detect system prompt leak attempts.
