tips:
  - tr: MCP sunucularını whitelist ile sınırlayın ve her sunucu için capability listesi tanımlayın.
    en: Restrict MCP servers with whitelist and define capability list for each server.
  - tr: Tool çağrılarını audit log'a kaydedin ve anormal pattern tespiti yapın.
    en: Log tool calls to audit log and detect abnormal patterns.
  - tr: stdio transport yerine TLS ile şifrelenmiş SSE kullanın.
    en: Use TLS-encrypted SSE instead of stdio transport.
