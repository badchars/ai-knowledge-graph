tips:
  - tr: SFT dataset'ini mutlaka deduplicate edin, exact match removal yapın.
    en: Always deduplicate SFT dataset, remove exact matches.
  - tr: Chat template validation'ı training loop'a ekleyin, runtime'da format check yapın.
    en: Add chat template validation to training loop, check format at runtime.
  - tr: SFT için epoch sayısını 3'ten fazla tutmayın, overfitting riski artar.
    en: Don't exceed 3 epochs for SFT, overfitting risk increases.
