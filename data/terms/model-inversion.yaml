tips:
  - tr: Production'da model API'lerinden mutlaka gradient'leri kapat — white-box model inversion saldırılarının temel gereksinimi gradyan erişimidir.
    en: Always disable gradients from model APIs in production — white-box model inversion attacks fundamentally require gradient access.
  - tr: Output diversity'yi artırmak için temperature >= 1.5 ve top-p=0.95 kullan — düşük diversity reconstruction saldırılarını kolaylaştırır.
    en: Use temperature >= 1.5 and top-p=0.95 to increase output diversity — low diversity facilitates reconstruction attacks.
  - tr: Rate limiting yap ve query pattern'lerini track et — saldırgan aggregated query ile reconstruction yapmak için binlerce query gönderir.
    en: Implement rate limiting and track query patterns — attackers send thousands of queries for aggregated query reconstruction.
