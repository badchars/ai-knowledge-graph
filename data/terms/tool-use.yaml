tips:
  - tr: Her tool için whitelist tabanlı parametre validasyonu yapın.
    en: Implement whitelist-based parameter validation for each tool.
  - tr: Kritik toollar (file operations, network requests) için approval workflow ekleyin.
    en: Add approval workflow for critical tools (file operations, network requests).
  - tr: Tool execution loglarını audit için saklayın.
    en: Store tool execution logs for audit purposes.
