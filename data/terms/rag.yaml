tips:
  - tr: Vektör veritabanına eklenen tüm dökümanları güvenilir kaynaklardan alın ve içerik doğrulama yapın.
    en: Only add documents from trusted sources to the vector database and perform content validation.
  - tr: Retrieval sonuçlarını LLM'e göndermeden önce sanitize edin ve maksimum context uzunluğu belirleyin.
    en: Sanitize retrieval results before sending to LLM and set maximum context length.
  - tr: Embedding modelini düzenli olarak güncelleyin; adversarial embedding saldırılarına karşı robust modeller kullanın.
    en: Regularly update embedding models; use robust models against adversarial embedding attacks.
