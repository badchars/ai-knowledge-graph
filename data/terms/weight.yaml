    authors: Hugging Face Team
tips:
  - tr: Model weight dosyalarını mutlaka GPG ile imzalayın ve yüklemeden önce imzayı doğrulayın.
    en: Always sign model weight files with GPG and verify signatures before loading.
  - tr: Güvenilmeyen kaynaklardan indirilen modelleri izole sandbox ortamda test edin.
    en: Test models from untrusted sources in isolated sandbox environments.
  - tr: Weight dosyalarına erişimi RBAC ile kısıtlayın ve tüm erişimleri audit log'layın.
    en: Restrict access to weight files using RBAC and audit log all access attempts.
