  - title: "BadNets: Identifying Vulnerabilities in the Machine Learning Model Supply Chain"
    url: https://arxiv.org/abs/1708.06733
    year: 2017
    type: paper
    authors: Tianyu Gu, Brendan Dolan-Gavitt, Siddharth Garg
  - title: "TrojanNet: Embedding Hidden Trojan Horse Models in Neural Networks"
    url: https://arxiv.org/abs/2002.10078
    year: 2020
    type: paper
    authors: Chuan Guo, Alexandre Sablayrolles, Hervé Jégou, Douwe Kiela
