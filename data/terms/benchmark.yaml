tips:
  - tr: Public benchmark'lara güvenmeyin; kendi security test suite'inizi oluşturun.
    en: Don't rely on public benchmarks; create your own security test suite.
  - tr: Benchmark sonuçlarını production deployment kararı için tek kriter olarak kullanmayın.
    en: Don't use benchmark results as sole criteria for production deployment decision.
