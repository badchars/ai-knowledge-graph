tips:
  - tr: FP16 inference'da overflow kontrolü için input validation ekleyin.
    en: Add input validation for overflow checking in FP16 inference.
  - tr: Kritik katmanlarda (normalization, softmax) FP32 kullanmayı düşünün.
    en: Consider using FP32 for critical layers (normalization, softmax).
