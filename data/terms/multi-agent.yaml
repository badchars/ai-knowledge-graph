tips:
  - tr: Her agent'a unique ID ve secret key verin, HMAC ile message authentication yapın.
    en: Give each agent unique ID and secret key, use HMAC for message authentication.
  - tr: Message timestamp kontrolü ile replay attacks önleyin, 1-2 dakika threshold kullanın.
    en: Prevent replay attacks with message timestamp checks, use 1-2 minute threshold.
  - tr: Agent registry ile trusted peers yönetin, unknown agent'ları reject edin.
    en: Manage trusted peers with agent registry, reject unknown agents.
