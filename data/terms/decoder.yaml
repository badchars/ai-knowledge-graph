tips:
  - tr: Multi-turn conversation'da her request'te KV cache'i reset edin, context leakage'ı önleyin.
    en: Reset KV cache on each request in multi-turn conversation to prevent context leakage.
  - tr: Temperature parameter'ı kullanıcıya açık bırakmayın, backend'de safe range'e clamp edin.
    en: Don't expose temperature parameter to users, clamp to safe range in backend.
  - tr: System prompt'ı tokenization sonrası doğrulayın, prefix injection bypass edilmemiş mi kontrol edin.
    en: Verify system prompt after tokenization to ensure prefix injection wasn't bypassed.
