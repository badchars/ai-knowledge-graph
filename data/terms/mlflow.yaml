tips:
  - tr: Production'da MLflow Tracking Server mutlaka authentication ile çalıştırın — default setup herkesin erişimine açık.
    en: Always run MLflow Tracking Server with authentication in production — default setup is open to everyone.
  - tr: Artifact store olarak S3 kullanıyorsanız IAM role + bucket encryption + versioning enable edin.
    en: If using S3 as artifact store, enable IAM role + bucket encryption + versioning.
  - tr: Model Registry ile production deployment yapın — manual model deployment yerine stage transition kullanın, rollback kolay.
    en: Use Model Registry for production deployment — use stage transition instead of manual model deployment, easy rollback.
