tips:
  - tr: AI firewall'ı sadece input filtering için değil, output validation için de kullanın — model bazen alignment bypass edildiğinde zararlı içerik üretebilir.
    en: Use AI firewall not just for input filtering but also output validation — models can sometimes produce harmful content when alignment is bypassed.
  - tr: "Regex-based firewall'lar hızlı ama bypass edilebilir, mutlaka ML-based semantic analysis ile kombine edin (örn: embedding-based similarity check)."
    en: Regex-based firewalls are fast but bypassable, must combine with ML-based semantic analysis (e.g., embedding-based similarity check).
  - tr: Context-aware filtering kullanın — multi-turn conversation'da zararlı intent birden fazla mesaja yayılabilir.
    en: Use context-aware filtering — in multi-turn conversations, malicious intent can be spread across multiple messages.
