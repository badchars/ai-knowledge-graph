id: federated-learning
name: Federated Learning
fullName: Federated Learning
category: training
desc:
  tr: |-
    Merkezi bir sunucuya veri göndermeden, birden fazla cihazda (telefon, hastane, şirket) dağıtık olarak model eğitimi yapan öğrenme paradigması. Her cihaz kendi verisiyle lokal olarak eğitim yapar, sadece model güncellemelerini (gradient'ler veya ağırlıklar) merkeze gönderir — ham veri asla paylaşılmaz.

    [Google](https://ai.googleblog.com/2017/04/federated-learning-collaborative.html)'ın 2016'da önerdiği bu yöntem, özellikle hassas verilerin (tıbbi kayıtlar, finansal veriler) gizliliğini korurken AI modeli eğitmek için idealdir. [FedAvg](https://arxiv.org/abs/1602.05629) (Federated Averaging) en yaygın algoritmasıdır: her client lokal eğitim yapar, server ağırlıkları ortalaması alır.

    [Apple](https://machinelearning.apple.com/research/learning-with-privacy-at-scale) klavye tahminleri, [Google](https://ai.googleblog.com) Gboard için federated learning kullanır. Ancak [differential privacy](https://en.wikipedia.org/wiki/Differential_privacy), Byzantine attack'lar, non-IID veri dağılımı gibi zorlukları vardır. [Flower](https://flower.dev), [PySyft](https://github.com/OpenMined/PySyft), [TensorFlow Federated](https://www.tensorflow.org/federated) gibi framework'ler implementation kolaylaştırır.
  en: |-
    A learning paradigm where model training happens distributed across multiple devices (phones, hospitals, companies) without sending data to a central server. Each device trains locally with its own data, sending only model updates (gradients or weights) to the center — raw data is never shared.

    [Google](https://ai.googleblog.com/2017/04/federated-learning-collaborative.html)'s 2016 proposal is ideal for training AI models while preserving privacy of sensitive data (medical records, financial data). [FedAvg](https://arxiv.org/abs/1602.05629) (Federated Averaging) is the most common algorithm: each client trains locally, server averages weights.

    [Apple](https://machinelearning.apple.com/research/learning-with-privacy-at-scale) uses federated learning for keyboard predictions, [Google](https://ai.googleblog.com) for Gboard. However, challenges include [differential privacy](https://en.wikipedia.org/wiki/Differential_privacy), Byzantine attacks, and non-IID data distribution. Frameworks like [Flower](https://flower.dev), [PySyft](https://github.com/OpenMined/PySyft), and [TensorFlow Federated](https://www.tensorflow.org/federated) simplify implementation.
  fr: Paradigme d'apprentissage où l'entraînement du modèle se fait de manière distribuée sur plusieurs appareils sans envoyer de données à un serveur central.
  zh: 一种学习范式，模型训练分布在多个设备上（手机、医院、公司），无需将数据发送到中央服务器。
  ar: نموذج تعلم حيث يتم تدريب النموذج بشكل موزع عبر أجهزة متعددة (هواتف، مستشفيات، شركات) دون إرسال البيانات إلى خادم مركزي.
  ru: Парадигма обучения, где модель тренируется распределённо на нескольких устройствах (телефонах, больницах, компаниях) без отправки данных на центральный сервер.
analogy:
  tr: Federated learning, her öğrencinin evde ders çalışıp sadece notlarını paylaştığı grup projesi gibidir. Öğretmen (server) notları toplar, ortalama alır ama hiç kimsenin ev ödevini görmez.
  en: Federated learning is like a group project where each student studies at home and only shares their notes. The teacher (server) collects notes and averages them, but never sees anyone's homework.
  fr: Le federated learning est comme un projet de groupe où chaque étudiant étudie chez lui et partage uniquement ses notes. Le professeur (serveur) collecte les notes et fait la moyenne, mais ne voit jamais les devoirs de personne.
  zh: 联邦学习就像一个小组项目，每个学生在家学习并只分享他们的笔记。老师（服务器）收集笔记并取平均值，但从不看任何人的作业。
  ar: التعلم الفدرالي يشبه مشروع جماعي حيث يدرس كل طالب في المنزل ويشارك ملاحظاته فقط. يجمع المعلم (الخادم) الملاحظات ويحسب المتوسط، لكنه لا يرى واجبات أحد أبدًا.
  ru: Федеративное обучение подобно групповому проекту, где каждый студент занимается дома и делится только своими заметками. Учитель (сервер) собирает заметки и усредняет их, но никогда не видит чью-либо домашнюю работу.
security:
  - title:
      tr: Gradient Leakage Saldırıları
      en: Gradient Leakage Attacks
      fr: Attaques par fuite de gradient
      zh: 梯度泄露攻击
      ar: هجمات تسريب التدرجات
      ru: Атаки утечки градиентов
    description:
      tr: Client'ların gönderdiği gradient'lerden eğitim verisi geri çıkarılabilir. Deep Leakage from Gradients (DLG), Inverting Gradients (iDLG) gibi saldırılar gradient'leri analiz ederek resimler, metinler hatta şifreler gibi hassas bilgileri rekonstrükte edebilir. Differential privacy olmadan federated learning güvenli değildir.
      en: Training data can be extracted from gradients sent by clients. Attacks like Deep Leakage from Gradients (DLG) and Inverting Gradients (iDLG) can reconstruct sensitive information like images, texts, and even passwords by analyzing gradients. Federated learning without differential privacy is not secure.
      fr: Les données d’entraînement peuvent être extraites des gradients envoyés par les clients. Des attaques comme Deep Leakage from Gradients (DLG) et Inverting Gradients (iDLG) peuvent reconstruire des informations sensibles telles que des images, des textes et même des mots de passe en analysant les gradients. L’apprentissage fédéré sans confidentialité différentielle n’est pas sécurisé.
      zh: 可以从客户端发送的梯度中提取训练数据。Deep Leakage from Gradients (DLG) 和 Inverting Gradients (iDLG) 等攻击可以通过分析梯度来重建图像、文本甚至密码等敏感信息。没有差分隐私的联邦学习是不安全的。
      ar: يمكن استخراج بيانات التدريب من التدرجات المرسلة من العملاء. يمكن لهجمات مثل DLG وiDLG إعادة بناء معلومات حساسة كالصور والنصوص وحتى كلمات المرور من خلال تحليل التدرجات. التعلم الموحد بدون الخصوصية التفاضلية غير آمن.
      ru: Данные обучения могут быть извлечены из градиентов, отправляемых клиентами. Атаки DLG и iDLG позволяют реконструировать изображения, тексты и даже пароли путём анализа градиентов. Федеративное обучение без дифференциальной приватности небезопасно.
    severity: critical
  - title:
      tr: Byzantine Poisoning Saldırıları
      en: Byzantine Poisoning Attacks
      fr: Attaques par empoisonnement byzantin
      zh: 拜占庭投毒攻击
      ar: هجمات التسميم البيزنطية
      ru: Атаки византийского отравления
    description:
      tr: Kötü niyetli client'lar manipüle edilmiş gradient'ler göndererek global modeli zehirleyebilir. Byzantine-robust aggregation (Krum, Trimmed Mean) olmadan, tek bir attacker bile model performansını ciddi şekilde bozabilir veya backdoor enjekte edebilir.
      en: Malicious clients can poison the global model by sending manipulated gradients. Without Byzantine-robust aggregation (Krum, Trimmed Mean), even a single attacker can seriously degrade model performance or inject backdoors.
      fr: Des clients malveillants peuvent empoisonner le modèle global en envoyant des gradients manipulés. Sans agrégation robuste aux pannes byzantines (Krum, Trimmed Mean), même un seul attaquant peut gravement dégrader les performances du modèle ou injecter des portes dérobées.
      zh: 恶意客户端可以通过发送篡改的梯度来污染全局模型。如果没有拜占庭容错聚合（Krum、Trimmed Mean），即使单个攻击者也可以严重降低模型性能或注入后门。
      ar: يمكن للعملاء الخبيثين تسميم النموذج العالمي بإرسال تدرجات تم التلاعب بها. بدون تجميع مقاوم للأخطاء البيزنطية (Krum، Trimmed Mean)، يمكن حتى لمهاجم واحد إضعاف أداء النموذج بشكل خطير أو حقن أبواب خلفية.
      ru: Злонамеренные клиенты могут отравить глобальную модель, отправляя манипулированные градиенты. Без византийски устойчивой агрегации (Krum, Trimmed Mean) даже один злоумышленник может серьёзно ухудшить производительность модели или внедрить бэкдоры.
    severity: critical
  - title:
      tr: Model Inversion via Membership Inference
      en: Model Inversion via Membership Inference
      fr: Inversion de modèle par inférence d’appartenance
      zh: 通过成员推断的模型反演攻击
      ar: عكس النموذج عبر استدلال العضوية
      ru: Инверсия модели через атаку вывода принадлежности
    description:
      tr: Federated learning'de global model'e erişim sağlandığında, membership inference attack ile hangi client'ların eğitime katıldığı tespit edilebilir. Bu da hassas veriye sahip organizasyonların (hastane, banka) kimliğini ifşa eder. GDPR ve compliance açısından risk.
      en: With access to the global model in federated learning, membership inference attacks can determine which clients participated in training. This reveals the identity of organizations with sensitive data (hospitals, banks). Risk for GDPR and compliance.
      fr: Avec l’accès au modèle global en apprentissage fédéré, les attaques par inférence d’appartenance peuvent déterminer quels clients ont participé à l’entraînement. Cela révèle l’identité des organisations détenant des données sensibles (hôpitaux, banques). Risque pour le RGPD et la conformité.
      zh: 在联邦学习中获得对全局模型的访问后，成员推断攻击可以确定哪些客户端参与了训练。这会暴露拥有敏感数据的组织（医院、银行）的身份。存在 GDPR 和合规性风险。
      ar: عند الوصول إلى النموذج العالمي في التعلم الموحد، يمكن لهجمات استدلال العضوية تحديد العملاء الذين شاركوا في التدريب. يكشف هذا عن هوية المنظمات ذات البيانات الحساسة (مستشفيات، بنوك). مخاطر تتعلق بـ GDPR والامتثال.
      ru: При доступе к глобальной модели в федеративном обучении атаки вывода принадлежности могут определить, какие клиенты участвовали в обучении. Это раскрывает личность организаций с конфиденциальными данными (больницы, банки). Риск для GDPR и комплаенса.
    severity: high
  - title:
      tr: Federated Learning Konfigürasyon Bilgi Sızıntısı
      en: Federated Learning Configuration Information Disclosure
      fr: Divulgation de configuration federated learning
      zh: federated learning配置信息泄露
      ar: كشف معلومات تكوين federated-learning
      ru: Раскрытие конфигурации federated-learning
    description:
      tr: Federated Learning ile ilgili versiyon, framework ve deployment bilgileri hata mesajlarında veya API yanıtlarında açığa çıkabilir.
      en: Version, framework, and deployment details related to federated learning can be exposed in error messages or API responses, aiding targeted attacks.
      fr: Les détails de version et de déploiement liés à federated learning peuvent être exposés dans les messages d'erreur ou les réponses API.
      zh: 与federated learning相关的版本、框架和部署细节可能在错误消息或API响应中暴露。
      ar: يمكن كشف تفاصيل الإصدار والنشر المتعلقة بـ federated-learning في رسائل الخطأ.
      ru: Сведения о версии и развёртывании federated-learning могут быть раскрыты в сообщениях об ошибках или ответах API.
    severity: low
config:
  - title: Federated Averaging (FedAvg) with Flower
    lang: python
    code: |-
      # Install: pip install flwr torch torchvision
      import flwr as fl
      import torch
      import torch.nn as nn
      from torch.utils.data import DataLoader
      from torchvision import datasets, transforms

      # Define a simple model
      class SimpleNet(nn.Module):
          def __init__(self):
              super().__init__()
              self.fc = nn.Linear(784, 10)

          def forward(self, x):
              return self.fc(x.view(-1, 784))

      # Flower client
      class FlowerClient(fl.client.NumPyClient):
          def __init__(self, model, trainloader):
              self.model = model
              self.trainloader = trainloader

          def get_parameters(self, config):
              return [val.cpu().numpy() for val in self.model.state_dict().values()]

          def set_parameters(self, parameters):
              params_dict = zip(self.model.state_dict().keys(), parameters)
              state_dict = {k: torch.tensor(v) for k, v in params_dict}
              self.model.load_state_dict(state_dict, strict=True)

          def fit(self, parameters, config):
              self.set_parameters(parameters)
              # Train locally
              optimizer = torch.optim.SGD(self.model.parameters(), lr=0.01)
              criterion = nn.CrossEntropyLoss()

              self.model.train()
              for images, labels in self.trainloader:
                  optimizer.zero_grad()
                  outputs = self.model(images)
                  loss = criterion(outputs, labels)
                  loss.backward()
                  optimizer.step()

              return self.get_parameters(config={}), len(self.trainloader), {}

      # Start client
      def client_fn(cid: str):
          # Load data for this client
          transform = transforms.ToTensor()
          trainset = datasets.MNIST("./data", train=True, download=True, transform=transform)
          trainloader = DataLoader(trainset, batch_size=32, shuffle=True)

          model = SimpleNet()
          return FlowerClient(model, trainloader)

      # Start federated learning
      fl.client.start_numpy_client(
          server_address="localhost:8080",
          client=client_fn("0")
      )
    description:
      tr: Flower framework ile federated learning implementasyonu. Her client lokal veri ile eğitim yapar, parametre güncellemelerini server'a gönderir. Server FedAvg ile ortalamasını alır. Production FL deployment için en popüler framework.
      en: Federated learning implementation with Flower framework. Each client trains with local data, sends parameter updates to server. Server averages them with FedAvg. Most popular framework for production FL deployment.
  - title: Federated Learning Secure Aggregation
    lang: terraform
    code: |-
      resource "aws_ecs_service" "fl_aggregator" {
        name            = "fl-aggregation-server"
        cluster         = aws_ecs_cluster.ml.id
        task_definition = aws_ecs_task_definition.fl.arn
        desired_count   = 1
        launch_type     = "FARGATE"
        network_configuration {
          subnets          = var.private_subnet_ids
          security_groups  = [aws_security_group.fl.id]
          assign_public_ip = false
        }
      }

      resource "aws_security_group" "fl" {
        name_prefix = "fl-aggregator-"
        vpc_id      = var.vpc_id
        ingress {
          from_port   = 8443
          to_port     = 8443
          protocol    = "tcp"
          cidr_blocks = [var.vpn_cidr]
          description = "FL gRPC with mTLS"
        }
        egress {
          from_port   = 443
          to_port     = 443
          protocol    = "tcp"
          cidr_blocks = [var.registry_cidr]
        }
      }
    description:
      tr: FL aggregation sunucusu icin AWS Terraform.
      en: AWS Terraform config for FL aggregation server.
research:
  - title: Communication-Efficient Learning of Deep Networks from Decentralized Data (FedAvg)
    url: https://arxiv.org/abs/1602.05629
    year: 2016
    type: paper
    authors: H. Brendan McMahan, et al.
  - title: Deep Leakage from Gradients
    url: https://arxiv.org/abs/1906.08935
    year: 2019
    type: paper
    authors: Ligeng Zhu, Zhijian Liu, Song Han
  - title: Advances and Open Problems in Federated Learning
    url: https://arxiv.org/abs/1912.04977
    year: 2019
    type: paper
    authors: Peter Kairouz, et al.
tips:
  - tr: Federated learning'de mutlaka differential privacy (DP-SGD, gradient clipping + noise) kullanın, aksi halde gradient leakage riski çok yüksek.
    en: Always use differential privacy (DP-SGD, gradient clipping + noise) in federated learning, otherwise gradient leakage risk is very high.
  - tr: Byzantine attack'lara karşı robust aggregation (Krum, Median, Trimmed Mean) kullanın. FedAvg tek başına Byzantine-resistant değildir.
    en: Use robust aggregation (Krum, Median, Trimmed Mean) against Byzantine attacks. FedAvg alone is not Byzantine-resistant.
  - tr: Non-IID veri dağılımı (her client farklı veri dağılımına sahip) model convergence'ını yavaşlatır. FedProx, SCAFFOLD gibi algoritmaları değerlendirin.
    en: Non-IID data distribution (each client has different data distribution) slows model convergence. Evaluate algorithms like FedProx, SCAFFOLD.
