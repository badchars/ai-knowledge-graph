tips:
  - tr: Yeni model eğitiyorsanız baştan SafeTensors formatında kaydedin, pickle kullanmayın — güvenlik + performance avantajı.
    en: If training new model, save in SafeTensors format from start, don't use pickle — security + performance advantage.
  - tr: Hugging Face'den model indirirken .safetensors dosyasını tercih edin, .bin veya .pth varsa dönüştürün.
    en: When downloading from Hugging Face, prefer .safetensors file, if .bin or .pth exists, convert it.
  - tr: SafeTensors SHA256 hash'i verify edin — corrupted file detection için önemli, integrity garantisi sağlar.
    en: Verify SafeTensors SHA256 hash — important for corrupted file detection, provides integrity guarantee.
