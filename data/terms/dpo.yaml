tips:
  - tr: DPO preference data'sını minimum 3 annotator ile validate edin, majority voting kullanın.
    en: Validate DPO preference data with minimum 3 annotators, use majority voting.
  - tr: Beta parameter'ı 0.05-0.2 aralığında tutun, aggressive alignment'tan kaçının.
    en: Keep beta parameter in 0.05-0.2 range, avoid aggressive alignment.
  - tr: Reference model'i trusted source'dan indirin ve hash doğrulaması yapın.
    en: Download reference model from trusted source and verify hash.
