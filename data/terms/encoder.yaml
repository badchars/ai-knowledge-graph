tips:
  - tr: Encoder API'den attention weight'leri expose etmeyin, membership inference riski yaratır.
    en: Don't expose attention weights from encoder API - creates membership inference risk.
  - tr: Medical/financial encoder fine-tuning'de mutlaka differential privacy kullanın.
    en: Always use differential privacy when fine-tuning medical/financial encoders.
  - tr: Fine-tuning sonrası safety evaluation tekrarlayın, catastrophic forgetting kontrolü yapın.
    en: Repeat safety evaluation after fine-tuning to check for catastrophic forgetting.
