tips:
  - tr: Guardrail'leri hem input hem output'a uygulayın. Model yanıtları da zararlı olabilir (training data poisoning nedeniyle).
    en: Apply guardrails to both input and output. Model responses can also be harmful (due to training data poisoning).
  - tr: Regex-based guardrail'ler yeterli değil. Semantic similarity ve LLM-based meta-validation kullanın.
    en: Regex-based guardrails are insufficient. Use semantic similarity and LLM-based meta-validation.
  - tr: Guardrail bypass denemelerini loglayın ve anomaly detection yapın. Repeated bypass attempts = potansiyel saldırı.
    en: Log guardrail bypass attempts and perform anomaly detection. Repeated bypass attempts = potential attack.
