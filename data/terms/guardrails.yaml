id: guardrails
name: Guardrails
fullName: AI Guardrails
category: ai-security
desc:
  tr: |-
    AI sistemlerinin güvenli ve uygun şekilde çalışmasını sağlayan koruma mekanizmaları. Girdi guardrail'leri zararlı veya uygunsuz kullanici isteklerini filtreler; çıktı guardrail'leri modelin ürettiği içeriği denetler.

    Örneğin bir saglik chatbot'u tıbbi teshis koymamasi için guardrail'lerle sinirlandirilir. Teknik olarak kural tabanlı filtreler, siniflandirici modeller veya ikinci bir LLM'in çıktıyi denetlemesi seklinde uygulanabilir.

    [NVIDIA](https://nvidia.com) NeMo Guardrails ve Guardrails AI gibi açık kaynaklı framework'ler bu altyapiyi standartlastirmistir. Guardrail'ler güvenlik, uyumluluk ve marka korumasi için kritik oneme sahiptir.
  en: |-
    Safety mechanisms that ensure AI systems operate within acceptable boundaries. Input guardrails filter harmful or inappropriate user requests; output guardrails audit the content generated by the model.

    For example, a healthcare chatbot iş constrained by guardrails to not make medical diagnoses. Technically, guardrails can be implemented as rule-based filters, classifier models, or a second LLM that reviews the output.

    Open-source frameworks like [NVIDIA](https://nvidia.com) NeMo Guardrails and Guardrails AI have standardized this infrastructure. Guardrails are critical for security, compliance, and brand protection.
  fr: Mecanismes de securite qui garantissent que les systemes d'IA fonctionnent dans des limites acceptables. Les guardrails d'entree filtrent les requetes nuisibles ou inappropriees; les guardrails de sortie verifient le contenu genere par le modele. Par exemple, un chatbot de sante est contraint par des guardrails pour ne pas poser de diagnostics medicaux. Techniquement, les guardrails peuvent etre implementes comme des filtres bases sur des regles, des modeles classificateurs ou un second LLM qui examine la sortie. Des frameworks open source comme NVIDIA NeMo Guardrails et Guardrails AI ont standardise cette infrastructure. Les guardrails sont essentiels pour la securite, la conformite et la protection de la marque.
  zh: 确保AI系统在可接受范围内运行的安全机制。输入护栏过滤有害或不当的用户请求；输出护栏审查模型生成的内容。例如，医疗聊天机器人受护栏约束不能进行医学诊断。技术上，护栏可以实现为基于规则的过滤器、分类器模型或审查输出的第二个LLM。NVIDIA NeMo Guardrails和Guardrails AI等开源框架已经标准化了这一基础设施。护栏对于安全、合规和品牌保护至关重要。
  ar: آليات امان تضمن عمل انظمة الذكاء الاصطناعي ضمن حدود مقبولة. حواجز المدخلات تصفي الطلبات الضارة او غير المناسبة وحواجز المخرجات تراجع المحتوى الذي ينتجه النموذج. على سبيل المثال، يتم تقييد روبوت الدردشة الصحي بحواجز حماية لعدم تقديم تشخيصات طبية. تقنيا يمكن تنفيذ الحواجز كمرشحات قائمة على القواعد او نماذج تصنيف او LLM ثان يراجع المخرجات. اطر العمل مفتوحة المصدر مثل NVIDIA NeMo Guardrails وGuardrails AI قامت بتوحيد هذه البنية التحتية. الحواجز ضرورية للامان والامتثال وحماية العلامة التجارية.
  ru: Механизмы безопасности, обеспечивающие работу систем ИИ в допустимых границах. Входные ограждения фильтруют вредные или неуместные запросы пользователей; выходные ограждения проверяют контент, сгенерированный моделью. Например, медицинский чат-бот ограничен guardrails, чтобы не ставить медицинские диагнозы. Технически guardrails могут быть реализованы как фильтры на основе правил, модели-классификаторы или второй LLM, проверяющий вывод. Фреймворки с открытым кодом, такие как NVIDIA NeMo Guardrails и Guardrails AI, стандартизировали эту инфраструктуру. Guardrails критически важны для безопасности, соответствия требованиям и защиты бренда.
analogy:
  tr: Otoyoldaki bariyer ve korkuluklar gibi. Arac yoldan çıktıginda onu durdurup tekrar yola yönlendirirler. Guardrail'ler de AI'in kabul edilebilir sinirlar dışina cikmasini engeller.
  en: Like the barriers and railings on a highway. When a car veers off course, they stop it and redirect it back to the road. Guardrails prevent AI from going outside acceptable boundaries.
  fr: Comme les barrieres et glissieres sur une autoroute. Quand une voiture devie de sa trajectoire, elles l'arretent et la redirigent vers la route. Les guardrails empechent l'IA de sortir des limites acceptables.
  zh: 就像高速公路上的护栏和栏杆。当车辆偏离方向时，它们会阻止车辆并将其引导回道路。护栏防止AI超出可接受的范围。
  ar: مثل الحواجز والدرابزين على الطريق السريع. عندما تنحرف السيارة عن مسارها، توقفها وتعيد توجيهها الى الطريق. الحواجز تمنع الذكاء الاصطناعي من الخروج عن الحدود المقبولة.
  ru: Как барьеры и ограждения на автомагистрали. Когда автомобиль сходит с курса, они останавливают его и направляют обратно на дорогу. Guardrails не дают ИИ выходить за допустимые границы.
security:
  - title:
      tr: Guardrail Bypass Teknikleri
      en: Guardrail Bypass Techniques
      fr: Techniques de contournement des garde-fous
      zh: 防护栏绕过技术
      ar: تقنيات تجاوز الحواجز الأمنية
      ru: Техники обхода guardrail
    description:
      tr: Saldırganlar prompt injection, encoding obfuscation (Base64/Hex), token smuggling ve multi-turn manipulation ile guardrail'leri aşabilir. Özellikle context window'un sonlarına enjekte edilen talimatlar, guardrail'lerin başta yaptığı kontrolleri atlatabilir.
      en: Attackers can bypass guardrails using prompt injection, encoding obfuscation (Base64/Hex), token smuggling and multi-turn manipulation. Instructions injected near the end of context window can evade initial guardrail checks.
      fr: Les attaquants peuvent contourner les garde-fous via l'injection de prompts, l'obfuscation par encodage (Base64/Hex), la contrebande de tokens et la manipulation multi-tours. Les instructions injectées vers la fin de la fenêtre de contexte peuvent échapper aux contrôles initiaux des garde-fous.
      zh: 攻击者可以通过提示注入、编码混淆（Base64/Hex）、token走私和多轮操纵来绕过防护栏。在上下文窗口末尾注入的指令可以逃避防护栏的初始检查。
      ar: يمكن للمهاجمين تجاوز الحواجز الأمنية باستخدام حقن الأوامر وتشويش التشفير (Base64/Hex) وتهريب الرموز والتلاعب متعدد الجولات. التعليمات المحقونة قرب نهاية نافذة السياق يمكنها التهرب من فحوصات الحواجز الأولية.
      ru: Злоумышленники могут обходить guardrail с помощью инъекции промптов, обфускации кодировкой (Base64/Hex), контрабанды токенов и многоходовой манипуляции. Инструкции, внедрённые ближе к концу контекстного окна, могут избежать начальных проверок guardrail.
    severity: high
  - title:
      tr: PII Sızıntısı ve Content Filter Atlatma
      en: PII Leakage and Content Filter Evasion
      fr: Fuite de données personnelles et contournement des filtres de contenu
      zh: 个人身份信息泄露与内容过滤器规避
      ar: تسريب المعلومات الشخصية والتهرب من مرشحات المحتوى
      ru: Утечка персональных данных и обход контент-фильтров
    description:
      tr: "Guardrail'ler genellikle regex veya basit pattern matching kullanır. Saldırganlar PII'yi parçalara bölerek (e-posta: user + @ + domain), homonim karakterlerle (0 yerine O), ya da dil değiştirerek filtreleri atlatabilir. Output guardrail'leri de aynı şekilde manipüle edilebilir."
      en: "Guardrails typically use regex or simple pattern matching. Attackers can bypass filters by fragmenting PII (email: user + @ + domain), using homoglyphs (O instead of 0), or switching languages. Output guardrails can be manipulated similarly."
      fr: "Les garde-fous utilisent généralement des regex ou du simple pattern matching. Les attaquants peuvent contourner les filtres en fragmentant les données personnelles (email: user + @ + domain), en utilisant des homoglyphes (O au lieu de 0), ou en changeant de langue. Les garde-fous de sortie peuvent être manipulés de la même manière."
      zh: 防护栏通常使用正则表达式或简单的模式匹配。攻击者可以通过分割个人信息（电子邮件：user + @ + domain）、使用同形字符（用O代替0）或切换语言来绕过过滤器。输出防护栏也可以被类似地操纵。
      ar: "تستخدم الحواجز الأمنية عادةً التعابير النمطية أو مطابقة الأنماط البسيطة. يمكن للمهاجمين تجاوز المرشحات بتقسيم المعلومات الشخصية (البريد: user + @ + domain)، واستخدام المتجانسات (O بدلاً من 0)، أو تبديل اللغات. يمكن التلاعب بحواجز المخرجات بالمثل."
      ru: "Guardrail обычно используют regex или простой pattern matching. Злоумышленники могут обходить фильтры, фрагментируя PII (email: user + @ + domain), используя омоглифы (O вместо 0) или переключая языки. Выходные guardrail могут быть манипулированы аналогично."
    severity: medium
  - title:
      tr: Guardrail Kapsam Denetimi Eksikliği
      en: Guardrail Coverage Audit Gap
      fr: Lacune dans l'audit de couverture des garde-fous
      zh: 防护栏覆盖率审计缺口
      ar: فجوة تدقيق تغطية الحواجز الأمنية
      ru: Пробел в аудите покрытия guardrail
    description:
      tr: Guardrail'lerin hangi kategorileri kapsadığı ve hangilerini kaçırdığı genellikle sistematik olarak test edilmez. Yeni saldırı vektörleri ortaya çıktığında guardrail güncellemeleri gecikmeli olur ve coverage gap oluşur.
      en: Which categories guardrails cover and which they miss is typically not systematically tested. When new attack vectors emerge, guardrail updates are delayed, creating coverage gaps.
      fr: Les catégories couvertes ou manquées par les garde-fous ne sont généralement pas testées systématiquement. Lorsque de nouveaux vecteurs d'attaque émergent, les mises à jour des garde-fous sont retardées, créant des lacunes de couverture.
      zh: 防护栏覆盖哪些类别以及遗漏哪些类别通常没有经过系统测试。当新的攻击向量出现时，防护栏更新会延迟，产生覆盖缺口。
      ar: عادةً لا يتم اختبار الفئات التي تغطيها الحواجز الأمنية والتي تفتقدها بشكل منهجي. عند ظهور نواقل هجوم جديدة، تتأخر تحديثات الحواجز الأمنية، مما يخلق فجوات في التغطية.
      ru: Какие категории покрывают guardrail и какие пропускают, обычно не тестируется систематически. При появлении новых векторов атак обновления guardrail запаздывают, создавая пробелы в покрытии.
    severity: low
config:
  - title: Multi-Layer Guardrail System
    lang: python
    code: |-
      from guardrails import Guard, Validator
      from guardrails.validators import ToxicLanguage, PIIFilter, RegexMatch
      import re

      # Define custom validator
      class PromptInjectionDetector(Validator):
          def validate(self, value, metadata):
              injection_patterns = [
                  r"ignore (previous|above) instructions",
                  r"system[:s]*you are now",
                  r"<|im_start|>|<|im_end|>",
                  r"\x[0-9a-f]{2}",  # Hex encoding
                  r"base64[,:s]",
              ]

              for pattern in injection_patterns:
                  if re.search(pattern, value, re.IGNORECASE):
                      raise ValueError(f"Potential prompt injection detected: {pattern}")
              return value

      # Create layered guard
      guard = Guard.from_string(
          validators=[
              ToxicLanguage(threshold=0.5, on_fail="exception"),
              PIIFilter(pii_entities=["email", "phone", "ssn"], on_fail="fix"),
              PromptInjectionDetector(on_fail="exception"),
              RegexMatch(regex=r"^.{1,500}$", on_fail="exception")  # Length limit
          ],
          description="Multi-layer security guardrail"
      )

      def secure_llm_call(user_input: str):
          try:
              # Input validation
              validated_input = guard.validate(user_input)

              # LLM call
              response = call_llm(validated_input)

              # Output validation
              validated_output = guard.validate(response)

              return validated_output
          except Exception as e:
              return f"Request blocked by guardrails: {str(e)}"
    description:
      tr: Çok katmanlı guardrail sistemi input ve output'u toxicity, PII, prompt injection ve uzunluk kontrollerinden geçirir. Her katman farklı bir güvenlik tehdidini ele alır.
      en: Multi-layer guardrail system validates input and output through toxicity, PII, prompt injection and length checks. Each layer addresses a different security threat.
  - title: Semantic Guardrail with Embeddings
    lang: python
    code: |-
      from sentence_transformers import SentenceTransformer, util
      import numpy as np

      class SemanticGuardrail:
          def __init__(self):
              self.model = SentenceTransformer('all-MiniLM-L6-v2')

              # Malicious intent examples
              self.malicious_examples = [
                  "how to hack into a system",
                  "create a virus or malware",
                  "instructions for illegal activities",
                  "bypass security measures",
                  "generate fake credentials"
              ]

              self.malicious_embeddings = self.model.encode(
                  self.malicious_examples,
                  convert_to_tensor=True
              )

          def check_intent(self, user_input: str, threshold=0.7) -> tuple[bool, float]:
              input_embedding = self.model.encode(user_input, convert_to_tensor=True)

              # Compute cosine similarities
              similarities = util.cos_sim(input_embedding, self.malicious_embeddings)
              max_similarity = similarities.max().item()

              is_safe = max_similarity < threshold
              return is_safe, max_similarity

      # Usage
      guardrail = SemanticGuardrail()
      is_safe, score = guardrail.check_intent("How do I secure my API keys?")
      print(f"Safe: {is_safe}, Similarity: {score:.3f}")
    description:
      tr: Semantic guardrail, embedding similarity kullanarak zararlı intent'i tespit eder. Regex'in atlatılamadığı semantik saldırıları (paraphrasing, dil değiştirme) yakalayabilir.
      en: Semantic guardrail detects malicious intent using embedding similarity. It can catch semantic attacks (paraphrasing, language switching) that bypass regex.
