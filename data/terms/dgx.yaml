tips:
  - tr: DGX BMC'yi management network'te izole edin, production network'ten asla erişilebilir olmasın.
    en: Isolate DGX BMC on management network - never accessible from production network.
  - tr: DGX OS güncellemelerini test ortamında doğrulayın, GPU driver uyumluluğunu kontrol edin.
    en: Validate DGX OS updates in test environment and check GPU driver compatibility.
  - tr: Multi-tenant DGX kullanımında mutlaka MIG veya vGPU kullanın, donanım izolasyonu sağlayın.
    en: Always use MIG or vGPU for multi-tenant DGX usage to ensure hardware isolation.
