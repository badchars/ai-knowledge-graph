tips:
  - tr: HuggingFace'den model indirirken hash verification yapın. Model file'ı tamper edilmiş olabilir.
    en: Perform hash verification when downloading models from HuggingFace. Model files may be tampered.
  - tr: Pretrained model kullanırken fine-tuning dataset'inizde anomaly detection yapın. Backdoor trigger'lar genellikle out-of-distribution'dır.
    en: Perform anomaly detection on your fine-tuning dataset when using pretrained models. Backdoor triggers are usually out-of-distribution.
