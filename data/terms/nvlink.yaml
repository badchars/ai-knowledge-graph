tips:
  - tr: Veri merkezinde NVLink kabloları fiziksel olarak güvence altına alın, erişimi kısıtlayın.
    en: Physically secure NVLink cables in data centers and restrict access.
  - tr: Multi-GPU sistemlerde NCCL traffic'ini log'layın, beklenmedik peer-to-peer transfer'leri tespit edin.
    en: Log NCCL traffic in multi-GPU systems to detect unexpected peer-to-peer transfers.
  - tr: DGX sistemlerinde NVSwitch firmware'ini düzenli güncelleyin, NVIDIA security bulletin'lerini takip edin.
    en: Regularly update NVSwitch firmware on DGX systems and follow NVIDIA security bulletins.
