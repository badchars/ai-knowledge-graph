    authors: Woosuk Kwon, Zhuohan Li, Siyuan Zhuang, et al.
tips:
  - tr: Her isteğe max_tokens ve timeout limiti koyun — sınırsız çıktı üretimine asla izin vermeyin.
    en: Set max_tokens and timeout limits on every request — never allow unlimited output generation.
    fr: Definissez des limites max_tokens et timeout pour chaque requete — n'autorisez jamais la generation de sortie illimitee.
    zh: 为每个请求设置max_tokens和超时限制——永远不要允许无限输出生成。
    ar: ضع حدود max_tokens ومهلة لكل طلب — لا تسمح أبداً بتوليد مخرجات غير محدودة.
    ru: Устанавливайте лимиты max_tokens и timeout на каждый запрос — никогда не позволяйте неограниченную генерацию.
  - tr: Agent döngülerinde mutlaka iterasyon limiti uygulayın (max 15-25 turn) — sonsuz loop'u engelleyin.
    en: Always enforce iteration limits on agent loops (max 15-25 turns) — prevent infinite loops.
    fr: Appliquez toujours des limites d'iteration sur les boucles d'agent (max 15-25 tours) — empchez les boucles infinies.
    zh: 始终对代理循环强制执行迭代限制（最多15-25轮）——防止无限循环。
    ar: فرض دائماً حدود التكرار على حلقات الوكيل (بحد أقصى 15-25 جولة) — امنع الحلقات اللانهائية.
    ru: Всегда применяйте лимиты итераций для циклов агента (макс. 15-25 ходов) — предотвращайте бесконечные циклы.
  - tr: Nginx veya API gateway seviyesinde per-IP rate limiting ve request body boyut sınırı uygulayın.
    en: Apply per-IP rate limiting and request body size limits at the Nginx or API gateway level.
    fr: Appliquez une limitation de debit par IP et des limites de taille du corps de requete au niveau Nginx ou API gateway.
    zh: 在Nginx或API网关级别应用每IP速率限制和请求体大小限制。
    ar: طبق تحديد معدل لكل IP وحدود حجم جسم الطلب على مستوى Nginx أو بوابة API.
    ru: Применяйте per-IP rate limiting и ограничения размера тела запроса на уровне Nginx или API gateway.
  - tr: Circuit breaker pattern uygulayın — ardışık timeout/hata durumunda isteği otomatik reddedin ve sistemi koruyun.
    en: Implement the circuit breaker pattern — automatically reject requests and protect the system during consecutive timeout/error conditions.
    fr: Implementez le pattern circuit breaker — rejetez automatiquement les requetes et protegez le systeme lors de conditions de timeout/erreur consecutives.
    zh: 实施断路器模式——在连续超时/错误情况下自动拒绝请求并保护系统。
    ar: طبق نمط قاطع الدائرة — ارفض الطلبات تلقائياً واحمِ النظام أثناء حالات المهلة/الخطأ المتتالية.
    ru: Внедрите паттерн circuit breaker — автоматически отклоняйте запросы и защищайте систему при последовательных таймаутах/ошибках.
