tips:
  - tr: Production API'lerde temperature default'unu 0.7-0.8 yapın ve override'ı sınırlayın.
    en: Set temperature default to 0.7-0.8 in production APIs and limit overrides.
  - tr: Temperature=0 request'lerini log edin ve anomaly detection için kullanın.
    en: Log temperature=0 requests and use for anomaly detection.
  - tr: Sensitive data işleyen uygulamalarda minimum temperature threshold (örn 0.3) zorunlu kılın.
    en: Enforce minimum temperature threshold (e.g., 0.3) in applications handling sensitive data.
