tips:
  - tr: VAE loss'ta KL divergence katsayısını (beta) ayarlayarak latent space'in smoothness/disentanglement dengesini kontrol edin (beta-VAE).
    en: Control latent space smoothness/disentanglement balance by adjusting KL divergence coefficient (beta) in VAE loss (beta-VAE).
  - tr: Anomaly detection için autoencoder kullanırken, reconstruction error'u threshold olarak belirleyin — yüksek error anomali işaretidir.
    en: When using autoencoders for anomaly detection, set reconstruction error as threshold — high error indicates anomaly.
  - tr: VAE latent space'inden sampling yaparak yeni veri üretirken, latent vector'ları interpolate ederek smooth transition'lar elde edebilirsiniz.
    en: When generating new data by sampling from VAE latent space, interpolate latent vectors to achieve smooth transitions.
