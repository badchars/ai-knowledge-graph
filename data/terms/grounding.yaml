tips:
  - tr: Grounding sources için domain whitelist kullanın, untrusted domains'ı block edin.
    en: Use domain whitelist for grounding sources, block untrusted domains.
  - tr: Retrieved content'in SHA256 hash'ini alıp cache'de saklayın, integrity check yapın.
    en: Take SHA256 hash of retrieved content and store in cache for integrity check.
  - tr: LLM response'daki citation'ları validate edin, fabricated citation'ları detect edin.
    en: Validate citations in LLM response, detect fabricated citations.
