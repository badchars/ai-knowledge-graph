security:
  - title:
      tr: Supply Chain Attacks
      en: Supply Chain Attacks
      fr: Attaques de la chaîne d'approvisionnement
      zh: 供应链攻击
      ar: هجمات سلسلة التوريد
      ru: Атаки на цепочку поставок
    description:
      tr: Foundation model'ler HuggingFace gibi platformlardan indirilirken, backdoor veya malicious code içerebilir. Model weights'e gömülü zararlı davranışlar, fine-tuning sonrası bile kalıcı olabilir.
      en: Foundation models downloaded from platforms like HuggingFace may contain backdoors or malicious code. Malicious behaviors embedded in model weights can persist even after fine-tuning.
      fr: Les foundation models téléchargés depuis des plateformes comme HuggingFace peuvent contenir des backdoors ou du code malveillant. Les comportements malveillants intégrés dans les poids du modèle peuvent persister même après le fine-tuning.
      zh: 从HuggingFace等平台下载的基础模型可能包含后门或恶意代码。嵌入模型权重中的恶意行为即使在微调后仍可能持续存在。
      ar: قد تحتوي النماذج الأساسية المحملة من منصات مثل HuggingFace على أبواب خلفية أو أكواد خبيثة. يمكن أن تستمر السلوكيات الخبيثة المضمنة في أوزان النموذج حتى بعد الضبط الدقيق.
      ru: Базовые модели, загруженные с платформ вроде HuggingFace, могут содержать бэкдоры или вредоносный код. Вредоносное поведение, встроенное в веса модели, может сохраняться даже после fine-tuning.
    severity: critical
  - title:
      tr: Model Poisoning via Pre-training
      en: Model Poisoning via Pre-training
      fr: Empoisonnement de modèle via le pré-entraînement
      zh: 通过预训练进行模型投毒
      ar: تسميم النموذج عبر التدريب المسبق
      ru: Отравление модели через предобучение
    description:
      tr: Foundation model'in pre-training datasına zehirli içerik eklenerek, model belirli triggerlara yanıt verecek şekilde manipüle edilebilir. Bu 'neural backdoor' tespiti çok zordur.
      en: By adding poisoned content to foundation model's pre-training data, model can be manipulated to respond to specific triggers. This 'neural backdoor' is very difficult to detect.
      fr: En ajoutant du contenu empoisonné aux données de pré-entraînement du foundation model, le modèle peut être manipulé pour répondre à des déclencheurs spécifiques. Ce 'neural backdoor' est très difficile à détecter.
      zh: 通过向基础模型的预训练数据中添加有毒内容，可以操纵模型对特定触发器做出响应。这种'神经后门'非常难以检测。
      ar: من خلال إضافة محتوى مسموم إلى بيانات التدريب المسبق للنموذج الأساسي، يمكن التلاعب بالنموذج للاستجابة لمحفزات محددة. يصعب جداً اكتشاف هذا 'الباب الخلفي العصبي'.
      ru: Добавляя отравленный контент в данные предобучения базовой модели, можно манипулировать моделью для реагирования на определённые триггеры. Этот 'нейронный бэкдор' очень сложно обнаружить.
    severity: high
  - title:
      tr: Model Kaynak Doğrulama Eksikliği
      en: Lack of Model Provenance Verification
      fr: Absence de vérification de la provenance du modèle
      zh: 缺乏模型来源验证
      ar: غياب التحقق من مصدر النموذج
      ru: Отсутствие проверки происхождения модели
    description:
      tr: Foundation model'lerin checksum veya imza doğrulaması olmadan kullanılması, değiştirilmiş modellerin tespit edilememesine yol açar. Model provenance tracking eksikliği, hangi model versiyonunun production'da çalıştığının bilinmemesi riski oluşturur.
      en: Using foundation models without checksum or signature verification leads to inability to detect tampered models. Lack of model provenance tracking creates risk of not knowing which model version is running in production.
      fr: L'utilisation de foundation models sans vérification de somme de contrôle ou de signature empêche la détection de modèles altérés. L'absence de suivi de provenance crée un risque de méconnaissance de la version en production.
      zh: 在没有校验和或签名验证的情况下使用基础模型，会导致无法检测被篡改的模型。缺乏模型溯源跟踪会带来不知道生产环境中运行的是哪个模型版本的风险。
      ar: استخدام النماذج الأساسية دون التحقق من المجموع الاختباري أو التوقيع يؤدي إلى عدم القدرة على اكتشاف النماذج المعدلة. غياب تتبع مصدر النموذج يخلق خطر عدم معرفة إصدار النموذج العامل في بيئة الإنتاج.
      ru: Использование базовых моделей без проверки контрольных сумм или подписей приводит к невозможности обнаружения подменённых моделей. Отсутствие отслеживания происхождения модели создаёт риск незнания, какая версия работает в production.
    severity: low
config:
  - title: Secure Model Loading and Verification
    lang: python
    code: |-
      import hashlib
      import requests
      from transformers import AutoModel, AutoTokenizer

      class SecureModelLoader:
          def __init__(self):
              # Whitelist of trusted model repositories
              self.trusted_repos = [
                  "openai-community",
                  "meta-llama",
                  "mistralai",
                  "google"
              ]

              # Known model checksums (SHA256)
              self.verified_checksums = {
                  "meta-llama/Llama-2-7b-hf": "abc123...",  # Example
              }

          def verify_model_source(self, model_id: str) -> bool:
              """Verify model comes from trusted source"""
              org = model_id.split('/')[0]
              if org not in self.trusted_repos:
                  raise SecurityError(f"Untrusted model source: {org}")
              return True

          def verify_checksum(self, model_path: str, expected_hash: str) -> bool:
              """Verify model file integrity"""
              sha256_hash = hashlib.sha256()
              with open(model_path, "rb") as f:
                  for byte_block in iter(lambda: f.read(4096), b""):
                      sha256_hash.update(byte_block)

              actual_hash = sha256_hash.hexdigest()
              if actual_hash != expected_hash:
                  raise SecurityError("Model checksum mismatch")
              return True

          def safe_load(self, model_id: str, use_auth_token: str = None):
              """Safely load foundation model with verification"""

              # Verify source
              self.verify_model_source(model_id)

              # Load model with restricted execution
              try:
                  model = AutoModel.from_pretrained(
                      model_id,
                      use_auth_token=use_auth_token,
                      trust_remote_code=False,  # CRITICAL: Disable arbitrary code
                      torch_dtype="auto",
                      device_map="auto"
                  )
                  tokenizer = AutoTokenizer.from_pretrained(
                      model_id,
                      use_auth_token=use_auth_token,
                      trust_remote_code=False
                  )
              except Exception as e:
                  raise SecurityError(f"Model loading failed: {e}")

              # Log model metadata
              print(f"Loaded model: {model_id}")
              print(f"Config: {model.config}")

              return model, tokenizer

      class SecurityError(Exception):
          pass

      # Usage
      loader = SecureModelLoader()

      # Safe loading
      try:
          model, tokenizer = loader.safe_load("meta-llama/Llama-2-7b-hf")
      except SecurityError as e:
          print(f"Security check failed: {e}")
    description:
      tr: Foundation model loading için güvenlik kontrolleri. Source verification ve trust_remote_code=False.
      en: Security checks for foundation model loading. Source verification and trust_remote_code=False.
