tips:
  - tr: Sadece doğrulanmış kaynaklardan (HuggingFace verified, official repos) model indirin.
    en: Only download models from verified sources (HuggingFace verified, official repos).
  - tr: ASLA trust_remote_code=True kullanmayın; arbitrary code execution riski.
    en: NEVER use trust_remote_code=True; arbitrary code execution risk.
  - tr: Model weights'in checksum'ını doğrulayın.
    en: Verify model weights checksum.
