id: foundation-model
name: Foundation Model
fullName: Foundation Model
category: models
desc:
  tr: |-
    Belirli bir görev için değil, genel amacla eğitilmiş büyük ölçekli AI modeli — [GPT-4](https://openai.com/gpt-4), [Claude](https://claude.ai), [Llama](https://ai.meta.com/llama/) ve [Gemini](https://gemini.google.com) gibi. Bu terim 2021'de Stanford HAI tarafından popülerleştirilerek, bu modellerin tek bir uygulama için değil birden fazla kullanım alanınin temeli olarak tasarlandığını vurguladı.

    Bir binanın temeli gibi düşünun: üstüne chatbot, kod asistanı, medikal tanı sistemi veya hukuk araştırma aracı inşa edilebilir. Şirketler bu temel modelleri fine-tuning, RAG veya prompt engineering ile kendi ihtiyaçlarına göre özellestirir.

    Örneğin, Bloomberg [GPT-4](https://openai.com/gpt-4)'u alıp finansal analiz için fine-tune ederken, bir hastane aynı modeli hasta kayıtlarını özetlemek için kullanabilir. Foundation model eğitmek muazzam kaynak gerektirir — GPT-4'un eğitimi 100 milyon dolardan fazlaya mal olmuştur.
  en: |-
    A large-scale AI model trained for general purposes rather than a specific task — like [GPT-4](https://openai.com/gpt-4), [Claude](https://claude.ai), [Llama](https://ai.meta.com/llama/), or [Gemini](https://gemini.google.com). The term was popularized by Stanford HAI in 2021 to emphasize that these models are designed as the foundation for multiple downstream applications, not just one.

    Think of it as a building's foundation: you can build a chatbot, code assistant, medical diagnosis system, or legal research tool on top of it. Companies customize these base models for their specific needs through fine-tuning, RAG, or prompt engineering.

    For example, Bloomberg fine-tuned [GPT-4](https://openai.com/gpt-4) for financial analysis, while a hospital might use the same model to summarize patient records. Training a foundation model requires enormous resources — GPT-4's training reportedly cost over $100 million, which iş why only a handful of companies ([OpenAI](https://openai.com), [Anthropic](https://anthropic.com), [Google](https://ai.google), [Meta](https://ai.meta.com)) can build them from scratch.
  fr: "Un modele d'IA a grande echelle entraine pour des usages generaux plutot que pour une tache specifique — comme GPT-4, Claude, Llama ou Gemini. Le terme a ete popularise par Stanford HAI en 2021 pour souligner que ces modeles sont concus comme fondation pour de multiples applications en aval, pas une seule. Pensez-y comme la fondation d'un batiment : vous pouvez construire un chatbot, un assistant de code, un systeme de diagnostic medical ou un outil de recherche juridique dessus. Les entreprises personnalisent ces modeles de base pour leurs besoins specifiques via le fine-tuning, le RAG ou le prompt engineering. Par exemple, Bloomberg a fine-tune GPT-4 pour l'analyse financiere, tandis qu'un hopital pourrait utiliser le meme modele pour resumer les dossiers patients. Former un modele de fondation necessite des ressources enormes — l'entrainement de GPT-4 aurait coute plus de 100 millions de dollars, c'est pourquoi seule une poignee d'entreprises (OpenAI, Anthropic, Google, Meta) peuvent les construire de zero."
  zh: 为通用目的而非特定任务训练的大规模AI模型——如GPT-4、Claude、Llama或Gemini。这个术语在2021年由Stanford HAI推广，强调这些模型被设计为多个下游应用的基础，而非仅服务于单一用途。把它想象成建筑的地基：你可以在上面构建聊天机器人、代码助手、医疗诊断系统或法律研究工具。企业通过微调、RAG或提示工程来根据自身需求定制这些基础模型。例如，Bloomberg对GPT-4进行了金融分析的微调，而医院可能使用同一模型来总结患者病历。训练基础模型需要巨大的资源——据报道GPT-4的训练成本超过1亿美元，这就是为什么只有少数几家公司（OpenAI、Anthropic、Google、Meta）能从头构建它们。
  ar: "نموذج ذكاء اصطناعي واسع النطاق مدرب لأغراض عامة وليس لمهمة محددة — مثل GPT-4 وClaude وLlama وGemini. شاع هذا المصطلح من قبل Stanford HAI في 2021 للتأكيد على أن هذه النماذج مصممة كأساس لتطبيقات متعددة لاحقة وليس لتطبيق واحد فقط. فكر فيه كأساس مبنى: يمكنك بناء روبوت محادثة أو مساعد برمجة أو نظام تشخيص طبي أو أداة بحث قانوني فوقه. تخصص الشركات هذه النماذج الأساسية لاحتياجاتها عبر الضبط الدقيق أو RAG أو هندسة المطالبات. مثلاً، ضبطت Bloomberg نموذج GPT-4 للتحليل المالي، بينما قد يستخدم مستشفى نفس النموذج لتلخيص سجلات المرضى. يتطلب تدريب نموذج أساسي موارد هائلة — كلف تدريب GPT-4 أكثر من 100 مليون دولار، ولهذا لا يستطيع بناءها من الصفر سوى حفنة من الشركات (OpenAI وAnthropic وGoogle وMeta)."
  ru: "Крупномасштабная модель ИИ, обученная для общих целей, а не для конкретной задачи — вроде GPT-4, Claude, Llama или Gemini. Термин был популяризирован Stanford HAI в 2021 году, чтобы подчеркнуть, что эти модели проектируются как фундамент для множества последующих приложений, а не для одного. Представьте её как фундамент здания: на нём можно построить чат-бот, помощник для кода, систему медицинской диагностики или инструмент юридических исследований. Компании адаптируют эти базовые модели под свои нужды через fine-tuning, RAG или prompt engineering. Например, Bloomberg дообучила GPT-4 для финансового анализа, а больница может использовать ту же модель для составления резюме медицинских карт. Обучение foundation model требует огромных ресурсов — обучение GPT-4 обошлось более чем в $100 миллионов, поэтому лишь несколько компаний (OpenAI, Anthropic, Google, Meta) могут создавать их с нуля."
analogy:
  tr: Binanın temeli. Üstüne ofis de, ev de, okul da yapabilirsin.
  en: A building's foundation. You can build an office, home, or school on top of it.
  fr: Les fondations d'un bâtiment. Vous pouvez construire un bureau, une maison ou une école dessus.
  zh: 建筑的基础。你可以在上面建造办公室、住宅或学校。
  ar: أساس المبنى. يمكنك بناء مكتب أو منزل أو مدرسة فوقه.
