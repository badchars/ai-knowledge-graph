tips:
  - tr: Reward model'i de red-teaming yapın, adversarial prompt'lara karşı test edin.
    en: Red-team the reward model too, test against adversarial prompts.
  - tr: RLHF sonrası KL divergence'ı monitor edin, base model'den çok fazla sapma mode collapse işareti.
    en: Monitor KL divergence after RLHF - too much deviation from base model signals mode collapse.
  - tr: Preference data'sını GitHub'a koymayın, annotator pattern'leri reverse-engineer edilebilir.
    en: Don't put preference data on GitHub - annotator patterns can be reverse-engineered.
