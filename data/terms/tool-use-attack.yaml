tips:
  - tr: Agent araçlarına mutlaka allowlist uygulayın — default-deny politikası ile sadece gerekli araçları açın.
    en: Always apply an allowlist to agent tools — use a default-deny policy and only enable required tools.
    fr: Appliquez toujours une liste d'autorisation aux outils de l'agent — utilisez une politique de refus par defaut et n'activez que les outils necessaires.
    zh: 始终对代理工具应用允许列表——使用默认拒绝策略，仅启用所需工具。
    ar: طبق دائماً قائمة مسموحة على أدوات الوكيل — استخدم سياسة الرفض الافتراضي وفعّل فقط الأدوات المطلوبة.
    ru: Всегда применяйте allowlist к инструментам агента — используйте политику default-deny и включайте только необходимые инструменты.
  - tr: Hassas araçlar (run_command, write_file) için human-in-the-loop onay mekanizması kurun.
    en: Set up human-in-the-loop approval for sensitive tools (run_command, write_file).
    fr: Mettez en place une approbation humaine pour les outils sensibles (run_command, write_file).
    zh: 为敏感工具（run_command、write_file）设置人工审批机制。
    ar: أنشئ آلية موافقة بشرية للأدوات الحساسة (run_command، write_file).
    ru: Настройте human-in-the-loop одобрение для чувствительных инструментов (run_command, write_file).
  - tr: Tüm araç çağrılarını parametre dahil loglayın — SIEM entegrasyonu ile anomali tespiti yapın.
    en: Log all tool calls including parameters — integrate with SIEM for anomaly detection.
    fr: Journalisez tous les appels d'outils avec les parametres — integrez avec SIEM pour la detection d'anomalies.
    zh: 记录所有工具调用（包括参数）——与SIEM集成进行异常检测。
    ar: سجل جميع استدعاءات الأدوات بما في ذلك المعاملات — ادمج مع SIEM لاكتشاف الشذوذ.
    ru: Логируйте все вызовы инструментов включая параметры — интегрируйте с SIEM для обнаружения аномалий.
  - tr: Araç parametrelerini schema validation ile doğrulayın — path traversal, shell injection gibi pattern'ları engelleyin.
    en: Validate tool parameters with schema validation — block patterns like path traversal and shell injection.
    fr: Validez les parametres d'outils avec une validation de schema — bloquez les motifs comme le path traversal et l'injection shell.
    zh: 使用模式验证验证工具参数——阻止路径遍历和shell注入等模式。
    ar: تحقق من معاملات الأدوات بالتحقق من المخطط — احظر أنماط مثل اجتياز المسار وحقن الصدفة.
    ru: Валидируйте параметры инструментов с помощью schema validation — блокируйте паттерны вроде path traversal и shell injection.
