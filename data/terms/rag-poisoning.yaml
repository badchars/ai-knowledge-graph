tips:
  - tr: RAG veri kaynaklarına sadece doğrulanmış ve güvenilir kaynaklardan doküman kabul edin — açık erişimli kaynaklarda ekstra doğrulama yapın.
    en: Only accept documents from verified and trusted sources into RAG data stores — apply extra verification for open-access sources.
    fr: N'acceptez que des documents de sources verifiees et fiables dans les magasins de donnees RAG — appliquez une verification supplementaire pour les sources en acces libre.
    zh: 仅接受来自经过验证的可信来源的文档进入RAG数据存储——对开放访问来源进行额外验证。
    ar: اقبل فقط المستندات من مصادر موثوقة ومتحقق منها في مخازن بيانات RAG — طبق تحققاً إضافياً للمصادر المفتوحة الوصول.
    ru: Принимайте в хранилища данных RAG только документы из проверенных и доверенных источников — применяйте дополнительную верификацию для открытых источников.
  - tr: Her dokümanı SHA-256 hash ile kaydedin ve retrieval sırasında bütünlük doğrulaması yapın.
    en: Record every document with SHA-256 hash and perform integrity verification during retrieval.
    fr: Enregistrez chaque document avec un hash SHA-256 et effectuez une verification d'integrite lors de la recherche.
    zh: 使用SHA-256哈希记录每个文档，并在检索时进行完整性验证。
    ar: سجل كل مستند بتجزئة SHA-256 وأجرِ التحقق من السلامة أثناء الاسترجاع.
    ru: Записывайте каждый документ с хешем SHA-256 и проводите проверку целостности при извлечении.
  - tr: Embedding collision tespiti uygulayın — farklı kaynaklardan gelen aşırı benzer vektörleri otomatik flagleyin.
    en: Implement embedding collision detection — automatically flag excessively similar vectors from different sources.
    fr: Implementez la detection de collision d'embedding — signalez automatiquement les vecteurs excessivement similaires de sources differentes.
    zh: 实施嵌入碰撞检测——自动标记来自不同来源的过度相似向量。
    ar: طبق اكتشاف تصادم التضمين — أشِر تلقائياً للمتجهات المتشابهة بشكل مفرط من مصادر مختلفة.
    ru: Внедрите обнаружение коллизий эмбеддингов — автоматически помечайте чрезмерно похожие векторы из разных источников.
  - tr: Retrieval sonuçlarında kaynak çeşitliliği zorunlu kılın — tek bir kaynağın tüm sonuçlara hakim olmasını engelleyin.
    en: Enforce source diversity in retrieval results — prevent a single source from dominating all results.
    fr: Imposez la diversite des sources dans les resultats de recherche — empchez une seule source de dominer tous les resultats.
    zh: 在检索结果中强制执行来源多样性——防止单一来源主导所有结果。
    ar: فرض تنوع المصادر في نتائج الاسترجاع — امنع مصدراً واحداً من السيطرة على جميع النتائج.
    ru: Обеспечьте разнообразие источников в результатах поиска — не позволяйте одному источнику доминировать во всех результатах.
