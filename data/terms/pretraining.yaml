tips:
  - tr: Pretraining data'sını mutlaka deduplicate edin, memorization riskini azaltın.
    en: Always deduplicate pretraining data to reduce memorization risk.
  - tr: Checkpoint'ları S3'e yazarken encryption at rest ve in transit kullanın.
    en: Use encryption at rest and in transit when writing checkpoints to S3.
  - tr: Training cluster'ını isolated VPC'de çalıştırın, internet erişimini kısıtlayın.
    en: Run training cluster in isolated VPC and restrict internet access.
