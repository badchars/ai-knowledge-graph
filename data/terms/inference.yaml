tips:
  - tr: Inference API'lerine authentication ve authorization mutlaka ekleyin.
    en: Always add authentication and authorization to inference APIs.
  - tr: Output'larda PII (Personally Identifiable Information) filtering yapın.
    en: Implement PII (Personally Identifiable Information) filtering in outputs.
  - tr: Inference latency ve token count'u monitör edin; anomalileri tespit edin.
    en: Monitor inference latency and token counts; detect anomalies.
