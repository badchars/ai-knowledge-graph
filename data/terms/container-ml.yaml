tips:
  - tr: Multi-stage build kullanarak final image'i minimize edin, build tools dahil etmeyin.
    en: Minimize final image with multi-stage build, don't include build tools.
  - tr: Container'ı non-root user ile çalıştırın ve read-only filesystem kullanın.
    en: Run container with non-root user and use read-only filesystem.
  - tr: Trivy ile vulnerability scan yapın, base image'leri düzenli update edin.
    en: Scan vulnerabilities with Trivy, regularly update base images.
