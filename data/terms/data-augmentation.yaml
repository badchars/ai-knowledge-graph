tips:
  - tr: Self-instruct augmentation kullanıyorsan mutlaka seed data'yı human expert'lerle validate et — yanlış seed exponential olarak çoğalır.
    en: If using self-instruct augmentation, always validate seed data with human experts — incorrect seeds multiply exponentially.
  - tr: Augmentation library'lerini pip install yapmadan önce GitHub star sayısına ve maintainer reputation'ına bak — az bilinen library'ler backdoor içerebilir.
    en: Before pip installing augmentation libraries, check GitHub star count and maintainer reputation — lesser-known libraries may contain backdoors.
  - tr: Augmented data'nın original distribution'dan ne kadar uzaklaştığını KL-divergence ile ölç — 0.1'den büyükse augmentation parametrelerini azalt.
    en: Measure how far augmented data shifts from original distribution with KL-divergence — if >0.1, reduce augmentation parameters.
