id: synthetic-data
name: Synthetic Data
fullName: Synthetic Training Data
category: training
desc:
  tr: |-
    Gerçek dünya yerine yapay zeka tarafından üretilen ve başka AI modellerini eğitmek için kullanılan veri. Neden gerekli? Çünkü yüksek kaliteli gerçek veri bulmak hem pahalı hem de sınırlıdır -- özellikle tıp, hukuk veya güvenlik gibi hassas alanlarda.

    Microsoft'un Phi modelleri büyük ölçüde [GPT-4](https://openai.com/gpt-4) tarafından üretilmiş sentetik veriyle eğitildi ve boyutuna göre şaşırtıcı performans gösterdi. [Meta](https://ai.meta.com)'nin [Llama](https://ai.meta.com/llama/) 3 eğitiminde de sentetik veri önemli bir rol oynadı.

    Ancak riskler vardır: sentetik veri kaynak modelin öncül hatalarını (bias) taşıyabilir ve 'model çokmesi' (model collapse) denen bir durum oluşabilir -- modeller kendi çıktılariyla eğitildiginde kalite zamanla düşer. İyi bir sentetik veri pipeline'i filtreleme, doğrulama ve ceşitlendirme adımlari içerir.
  en: |-
    Data generated by AI rather than collected from the real world, used to train other AI models. Why iş it needed? Because finding high-quality real data iş both expensive and limited -- especially in sensitive domains like medicine, law, or security.

    Microsoft's Phi models were largely trained on synthetic data generated by [GPT-4](https://openai.com/gpt-4) and showed surprising performance for their size. Synthetic data also played a significant role in [Meta](https://ai.meta.com)'s [Llama](https://ai.meta.com/llama/) 3 training.

    However, there are risks: synthetic data can carry the source model's biases, and a phenomenon called 'model collapse' can occur -- when models are trained on their own outputs, quality degrades over time. A good synthetic data pipeline includes filtering, validation, and diversification steps.
  fr: "Des donnees generees par l'IA plutot que collectees dans le monde reel, utilisees pour entrainer d'autres modeles d'IA. Pourquoi est-ce necessaire ? Parce que trouver des donnees reelles de haute qualite est a la fois couteux et limite -- surtout dans des domaines sensibles comme la medecine, le droit ou la securite. Les modeles Phi de Microsoft ont ete largement entraines sur des donnees synthetiques generees par GPT-4 et ont montre des performances surprenantes pour leur taille. Les donnees synthetiques ont egalement joue un role important dans l'entrainement de Llama 3 de Meta. Cependant, il y a des risques : les donnees synthetiques peuvent porter les biais du modele source, et un phenomene appele 'effondrement du modele' peut se produire -- quand les modeles sont entraines sur leurs propres sorties, la qualite se degrade avec le temps. Un bon pipeline de donnees synthetiques inclut des etapes de filtrage, de validation et de diversification."
  zh: 由AI生成而非从真实世界收集的数据，用于训练其他AI模型。为什么需要它？因为获取高质量真实数据既昂贵又有限——尤其在医疗、法律或安全等敏感领域。微软的Phi模型主要使用GPT-4生成的合成数据训练，表现出与其规模不相称的惊人性能。合成数据在Meta的Llama 3训练中也发挥了重要作用。然而存在风险：合成数据可能携带源模型的偏见，并可能出现'模型坍塌'现象——当模型用自己的输出训练时，质量会随时间下降。好的合成数据流水线包括过滤、验证和多样化步骤。
  ar: "بيانات يولدها الذكاء الاصطناعي بدلا من جمعها من العالم الحقيقي وتستخدم لتدريب نماذج ذكاء اصطناعي اخرى. لماذا هي ضرورية؟ لان ايجاد بيانات حقيقية عالية الجودة مكلف ومحدود -- خاصة في مجالات حساسة كالطب والقانون والامن. دربت نماذج Phi من Microsoft بشكل كبير على بيانات اصطناعية ولدها GPT-4 واظهرت اداء مفاجئا لحجمها. لعبت البيانات الاصطناعية ايضا دورا مهما في تدريب Llama 3 من Meta. لكن هناك مخاطر: يمكن ان تحمل البيانات الاصطناعية تحيزات النموذج المصدر ويمكن ان يحدث ما يسمى 'انهيار النموذج' -- عندما تدرب النماذج على مخرجاتها تتدهور الجودة مع الوقت. يتضمن خط انابيب البيانات الاصطناعية الجيد خطوات تصفية وتحقق وتنويع."
  ru: "Данные, сгенерированные ИИ, а не собранные из реального мира, используемые для обучения других моделей ИИ. Зачем это нужно? Потому что поиск высококачественных реальных данных дорог и ограничен -- особенно в чувствительных областях вроде медицины, права или безопасности. Модели Phi от Microsoft были в значительной степени обучены на синтетических данных, сгенерированных GPT-4, и показали удивительную производительность для своего размера. Синтетические данные также сыграли важную роль в обучении Llama 3 от Meta. Однако есть риски: синтетические данные могут нести предвзятости исходной модели, и может возникнуть явление 'коллапса модели' -- когда модели обучаются на собственных выходных данных, качество со временем деградирует. Хороший пайплайн синтетических данных включает этапы фильтрации, валидации и диверсификации."
analogy:
  tr: Sentetik veri, üçus simulatorunde eğitim gibidir. Gerçek üçus deneyimi yerine, gerçekci ama yapay senaryolarla pilot yetistirirsiniz. Üçuz, güvenli ve istediginiz kadar tekrar edilebilir -- ama simulatorun kendışindeki hatalar pilotun yanlış aliskanliklar edinmesine yol acabilir.
  en: Synthetic data iş like training in a flight simulator. Instead of real flight experience, you train pilots with realistic but artificial scenarios. It's cheaper, safer, and infinitely repeatable -- but flaws in the simulator itself can teach pilots bad habits.
  fr: Les donnees synthetiques sont comme l'entrainement sur un simulateur de vol. Au lieu d'une experience de vol reelle, vous formez les pilotes avec des scenarios realistes mais artificiels. C'est moins cher, plus sur et infiniment repetable -- mais les defauts du simulateur lui-meme peuvent enseigner de mauvaises habitudes aux pilotes.
  zh: 合成数据就像在飞行模拟器中训练。不是用真实飞行经验，而是用逼真但人造的场景训练飞行员。更便宜、更安全、可无限重复——但模拟器本身的缺陷可能让飞行员养成坏习惯。
  ar: البيانات الاصطناعية تشبه التدريب على جهاز محاكاة الطيران. بدلا من تجربة الطيران الحقيقية تدرب الطيارين بسيناريوهات واقعية لكن اصطناعية. ارخص واكثر امانا وقابل للتكرار -- لكن عيوب المحاكي نفسه قد تعلم الطيارين عادات سيئة.
  ru: Синтетические данные -- это как обучение на авиасимуляторе. Вместо реального лётного опыта вы тренируете пилотов реалистичными, но искусственными сценариями. Дешевле, безопаснее и можно повторять бесконечно -- но недостатки самого симулятора могут привить пилотам плохие привычки.
security:
  - title:
      tr: Synthetic Data Poisoning
      en: Synthetic Data Poisoning
      fr: Empoisonnement des données synthétiques
      zh: 合成数据投毒
      ar: تسميم البيانات الاصطناعية
      ru: Отравление синтетических данных
    description:
      tr: LLM ile üretilen synthetic training data, model bias ve backdoor inject etmek için kullanılabilir. Saldırgan, generator LLM'i manipüle ederek biased/poisoned synthetic data üretir ve downstream model'leri etkiler.
      en: Synthetic training data generated with LLM can be used to inject model bias and backdoors. Attacker generates biased/poisoned synthetic data by manipulating generator LLM and affects downstream models.
      fr: Les données d'entraînement synthétiques générées avec un LLM peuvent être utilisées pour injecter des biais et des backdoors dans le modèle. L'attaquant génère des données synthétiques biaisées/empoisonnées en manipulant le LLM générateur et affecte les modèles en aval.
      zh: 用LLM生成的合成训练数据可以被用来注入模型偏见和后门。攻击者通过操纵生成器LLM生成有偏见/有毒的合成数据，影响下游模型。
      ar: يمكن استخدام بيانات التدريب الاصطناعية المولدة بنموذج لغة كبير لحقن تحيز النموذج والأبواب الخلفية. يولد المهاجم بيانات اصطناعية منحازة/مسمومة بالتلاعب بنموذج اللغة الكبير المولد ويؤثر على النماذج اللاحقة.
      ru: Синтетические обучающие данные, сгенерированные с помощью LLM, могут использоваться для внедрения предвзятости и бэкдоров в модель. Злоумышленник генерирует предвзятые/отравленные синтетические данные, манипулируя генераторной LLM, и влияет на последующие модели.
    severity: medium
  - title:
      tr: Synthetic Data Provenance Takibi
      en: Synthetic Data Provenance Tracking
      fr: Suivi de la provenance des données synthétiques
      zh: 合成数据溯源追踪
      ar: تتبع مصدر البيانات الاصطناعية
      ru: Отслеживание происхождения синтетических данных
    description:
      tr: Synthetic data'nın hangi model ve parametrelerle üretildiğinin takip edilmemesi, veri kalitesi ve bias sorunlarının kaynağının tespit edilmesini engeller.
      en: Not tracking which model and parameters generated synthetic data prevents identification of data quality and bias issue sources.
      fr: Ne pas suivre quel modèle et quels paramètres ont généré les données synthétiques empêche l'identification des sources de problèmes de qualité et de biais des données.
      zh: 不追踪合成数据是由哪个模型和参数生成的，会阻碍识别数据质量和偏见问题的来源。
      ar: عدم تتبع أي نموذج ومعاملات ولدت البيانات الاصطناعية يمنع تحديد مصادر مشاكل جودة البيانات والتحيز.
      ru: Отсутствие отслеживания, какой моделью и с какими параметрами были сгенерированы синтетические данные, препятствует выявлению источников проблем с качеством данных и предвзятостью.
    severity: low
config:
  - title: Synthetic Data Quality Validator
    lang: python
    code: |-
      import hashlib
      import json
      from datetime import datetime
      from typing import List, Dict

      def validate_synthetic_dataset(records: List[Dict], source_model: str) -> Dict:
          """Validate synthetic data quality and log provenance."""
          issues = []
          seen_hashes = set()
          duplicates = 0
          
          for i, record in enumerate(records):
              # Check for exact duplicates
              h = hashlib.sha256(json.dumps(record, sort_keys=True).encode()).hexdigest()
              if h in seen_hashes:
                  duplicates += 1
              seen_hashes.add(h)
              
              # Check for empty/null fields
              for key, val in record.items():
                  if val is None or (isinstance(val, str) and val.strip() == ""):
                      issues.append(f"Record {i}: empty field '{key}'")
          
          provenance = {
              "source_model": source_model,
              "generated_at": datetime.utcnow().isoformat(),
              "total_records": len(records),
              "unique_records": len(seen_hashes),
              "duplicate_count": duplicates,
              "duplicate_rate": round(duplicates / max(len(records), 1) * 100, 2),
              "quality_issues": issues[:20],  # first 20
              "dataset_hash": hashlib.sha256(
                  json.dumps(records, sort_keys=True).encode()
              ).hexdigest()[:16]
          }
          
          if provenance["duplicate_rate"] > 10:
              provenance["warning"] = "High duplicate rate — possible model collapse risk"
          
          return provenance
    description:
      tr: Synthetic data kalite doğrulama ve provenance takibi. Duplikasyon oranı, boş alanlar ve model collapse riskini kontrol eder.
      en: Synthetic data quality validation and provenance tracking. Checks duplication rate, empty fields and model collapse risk.
  - title: Synthetic Data Pipeline Security (Docker Compose)
    lang: yaml
    code: |-
      version: '3.8'
      services:
        synth-generator:
          image: synthetic-data-gen:latest
          read_only: true
          security_opt:
            - no-new-privileges:true
          cap_drop:
            - ALL
          environment:
            - MODEL_NAME=${GENERATOR_MODEL}
            - MAX_RECORDS=10000
            - OUTPUT_FORMAT=jsonl
          volumes:
            - synth-output:/output:rw
            - ./config:/config:ro
          networks:
            - synth-internal
          deploy:
            resources:
              limits:
                cpus: '4'
                memory: 16G
          healthcheck:
            test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
            interval: 30s

        synth-validator:
          image: data-validator:latest
          read_only: true
          security_opt:
            - no-new-privileges:true
          depends_on:
            synth-generator:
              condition: service_completed_successfully
          volumes:
            - synth-output:/input:ro
            - validated-output:/output:rw
          environment:
            - MAX_DUPLICATE_RATE=5
            - BIAS_CHECK_ENABLED=true
            - PROVENANCE_LOG=/output/provenance.json
          networks:
            - synth-internal

      volumes:
        synth-output:
        validated-output:

      networks:
        synth-internal:
          internal: true
    description:
      tr: Synthetic data generation pipeline'ı için güvenli Docker Compose yapılandırması. Read-only container, kaynak limitleri ve iç network izolasyonu içerir.
      en: Secure Docker Compose configuration for synthetic data generation pipeline. Includes read-only containers, resource limits and internal network isolation.
research:
  - title: Poisoning Web-Scale Training Datasets
    url: https://arxiv.org/abs/2302.10149
    year: 2023
    type: paper
    authors: Nicholas Carlini, Matthew Jagielski, Florian Tramèr
tips:
  - tr: Synthetic data kullanırken real data ile mix edin. 100% synthetic data quality issue'lara yol açar.
    en: Mix with real data when using synthetic data. 100% synthetic data leads to quality issues.
