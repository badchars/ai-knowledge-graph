tips:
  - tr: Dynamic batching mutlaka enable edin — throughput 2-5x artırır, latency sadece birkaç ms artar.
    en: Always enable dynamic batching — increases throughput 2-5x, latency increases only a few ms.
  - tr: Model repository S3'te ise IAM role ile access sağlayın, hardcoded credentials kullanmayın.
    en: If model repository is in S3, use IAM role for access, don't use hardcoded credentials.
  - tr: Production'da Triton API'yi asla doğrudan expose etmeyin — mutlaka API gateway + authentication kullanın.
    en: Never expose Triton API directly in production — always use API gateway + authentication.
