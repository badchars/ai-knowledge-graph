tips:
  - tr: Watermark secret key'ini mutlaka private tut — key leak olursa saldırgan spoofing attack yapabilir (insan yazısına fake watermark enjekte eder).
    en: Always keep the watermark secret key private — if the key leaks, the attacker can perform spoofing attacks (inject fake watermark into human writing).
  - tr: Multi-layer watermark kullan (token + sentence + paragraph level) — paraphrase attack sadece lexical level'ı etkiler, semantic level dayanıklıdır.
    en: Use multi-layer watermark (token + sentence + paragraph levels) — paraphrase attacks only affect lexical level, semantic level is robust.
  - tr: Watermark detection'ı tek başına kullanma, perplexity ve stylometry analizi ile kombine et — false positive/negative riskini azaltır.
    en: Don't use watermark detection alone, combine with perplexity and stylometry analysis — reduces false positive/negative risk.
