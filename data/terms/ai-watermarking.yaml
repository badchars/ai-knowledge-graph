id: ai-watermarking
name: AI Watermarking
fullName: AI Watermarking
category: ai-security
desc:
  tr: |-
    AI Watermarking, yapay zeka tarafından üretilen içeriğe (metin, görüntü, video) tespit edilebilir ama görünmez bir dijital imza ekleme tekniğidir. LLM'lerde watermarking, token seçimi sırasında kriptografik pattern enjekte ederek yapılır — insan okuyamaz ama detection algoritması tanır.

    [OpenAI](https://openai.com), [Google](https://deepmind.google/technologies/synthid/) ve [Meta](https://ai.meta.com) AI-generated content'i watermark ile işaretleme üzerinde çalışıyor. Örneğin, [SynthID](https://deepmind.google/technologies/synthid/) görüntülerde imperceptible pixel pattern'leri ekler. LLM'lerde ise [Kirchenbauer et al. (2023)](https://arxiv.org/abs/2301.10226) token distribution'da green-list/red-list yöntemiyle watermark embedding göstermiştir.

    Watermark, copyright protection, deepfake detection ve AI-generated spam filtering için kullanılır. Ancak watermark removal attack'leri (paraphrase, compression) ile silinebilir. Production'da watermark robustness (perturbation'a dayanıklılık) kritik bir güvenlik gereksinimidir.
  en: |-
    AI Watermarking is a technique that adds a detectable but invisible digital signature to AI-generated content (text, image, video). In LLMs, watermarking is done by injecting cryptographic patterns during token selection — imperceptible to humans but recognized by detection algorithms.

    [OpenAI](https://openai.com), [Google](https://deepmind.google/technologies/synthid/), and [Meta](https://ai.meta.com) are working on watermarking AI-generated content. For example, [SynthID](https://deepmind.google/technologies/synthid/) adds imperceptible pixel patterns to images. In LLMs, [Kirchenbauer et al. (2023)](https://arxiv.org/abs/2301.10226) demonstrated watermark embedding via green-list/red-list method in token distribution.

    Watermarking is used for copyright protection, deepfake detection, and AI-generated spam filtering. However, it can be removed via watermark removal attacks (paraphrase, compression). In production, watermark robustness (resistance to perturbation) is a critical security requirement.
  fr: Le filigrane IA est une technique qui ajoute une signature numérique détectable mais invisible au contenu généré par IA (texte, image, vidéo). Dans les LLM, le filigrane se fait en injectant des motifs cryptographiques lors de la sélection de jetons — imperceptible pour les humains mais reconnu par les algorithmes de détection.
  zh: AI水印是一种向AI生成的内容（文本、图像、视频）添加可检测但不可见数字签名的技术。在LLM中，水印通过在令牌选择期间注入加密模式来完成——人类无法感知但检测算法可识别。
  ar: العلامة المائية للذكاء الاصطناعي هي تقنية تضيف توقيعاً رقمياً قابلاً للكشف لكن غير مرئي للمحتوى المُنشأ بالذكاء الاصطناعي (نص، صورة، فيديو). في نماذج اللغة الكبيرة، يتم وضع العلامة المائية عن طريق حقن أنماط تشفيرية أثناء اختيار الرموز — غير محسوس للبشر لكن خوارزميات الكشف تتعرف عليه.
  ru: AI-вотермаркинг — это техника добавления обнаруживаемой, но невидимой цифровой подписи к контенту, созданному ИИ (текст, изображение, видео). В LLM вотермаркинг выполняется путём внедрения криптографических паттернов при выборе токенов — незаметен для людей, но распознаётся алгоритмами обнаружения.
analogy:
  tr: AI watermark, bir banknotun üzerindeki UV altında görünen gizli işaret gibidir — normal göz görmez ama özel ışık altında 'bu yapay zeka tarafından üretildi' yazısı belirir.
  en: AI watermark is like a hidden mark on a banknote visible under UV light — invisible to the naked eye, but under special light, 'this was generated by AI' appears.
  fr: Le filigrane IA ressemble à une marque cachée sur un billet de banque visible sous lumière UV — invisible à l'œil nu, mais sous une lumière spéciale, 'ceci a été généré par IA' apparaît.
  zh: AI水印就像钞票上在紫外线下可见的隐藏标记——肉眼看不见，但在特殊光线下，'这是由AI生成的'就会显现。
  ar: العلامة المائية للذكاء الاصطناعي تشبه علامة مخفية على ورقة نقدية مرئية تحت الضوء فوق البنفسجي — غير مرئية للعين المجردة، لكن تحت ضوء خاص، يظهر 'هذا أُنشئ بالذكاء الاصطناعي'.
  ru: AI-вотермарк — как скрытая метка на банкноте, видимая под УФ-светом — невидима невооружённым глазом, но под специальным светом появляется 'это было создано ИИ'.
security:
  - title:
      tr: Watermark Removal via Paraphrase Attack
      en: Watermark Removal via Paraphrase Attack
      fr: Suppression du filigrane par attaque de paraphrase
      zh: 通过改写攻击去除水印
      ar: إزالة العلامة المائية عبر هجوم إعادة الصياغة
      ru: Удаление водяного знака путём перефразирования
    description:
      tr: "LLM watermark’leri token distribution’da pattern enjekte eder — saldırgan watermark’lı metni başka bir LLM’e (örn: GPT-4) paraphrase ettirerek watermark pattern’ini bozar. Kirchenbauer et al. (2023) green-list watermark’ının paraphrase ile %80 silinebildiğini göstermiştir. Eğer watermark sadece lexical level’de ise, synonym replacement bile yeterlidir. Savunma: semantic-level watermarking (embedding space perturbation), multi-layer watermark (token + sentence + paragraph level), adversarial training (train detector on paraphrased text)."
      en: "LLM watermarks inject patterns into token distribution — the attacker paraphrases the watermarked text with another LLM (e.g., GPT-4) to break the watermark pattern. Kirchenbauer et al. (2023) showed that green-list watermarks can be removed 80% via paraphrase. If the watermark is only at the lexical level, even synonym replacement is sufficient. Defense: semantic-level watermarking (embedding space perturbation), multi-layer watermark (token + sentence + paragraph levels), adversarial training (train detector on paraphrased text)."
      fr: "Les filigranes LLM injectent des motifs dans la distribution des tokens — l’attaquant paraphrase le texte filigrané avec un autre LLM (ex. GPT-4) pour briser le motif. Kirchenbauer et al. (2023) ont montré que les filigranes green-list peuvent être supprimés à 80\_% par paraphrase. Si le filigrane n’opère qu’au niveau lexical, le remplacement par synonymes suffit. Défense : filigranage sémantique (perturbation de l’espace d’embedding), filigrane multicouche (token + phrase + paragraphe), entraînement adversarial (détecteur sur texte paraphrasé)."
      zh: LLM水印在词元分布中注入特定模式——攻击者使用另一个LLM（如GPT-4）对带水印的文本进行改写，从而破坏水印模式。Kirchenbauer等人（2023）的研究表明，绿名单水印可通过改写去除80%。如果水印仅在词汇层面运作，同义词替换即可破坏。防御：语义级水印（嵌入空间扰动）、多层水印（词元+句子+段落）、对抗训练（在改写文本上训练检测器）。
      ar: "تحقن علامات LLM المائية أنماطًا في توزيع الرموز — يعيد المهاجم صياغة النص الموسوم بعلامة مائية باستخدام نموذج لغوي آخر (مثل GPT-4) لكسر النمط. أظهر Kirchenbauer وآخرون (2023) أن علامات القائمة الخضراء يمكن إزالتها بنسبة 80% عبر إعادة الصياغة. إذا كانت العلامة على المستوى المعجمي فقط، فاستبدال المرادفات يكفي. الدفاع: وسم مائي دلالي (اضطراب فضاء التضمين)، علامة مائية متعددة الطبقات (رمز + جملة + فقرة)، تدريب تنافسي (تدريب الكاشف على نص معاد صياغته)."
      ru: "Водяные знаки LLM внедряют паттерны в распределение токенов — злоумышленник перефразирует текст другой LLM (напр. GPT-4), разрушая паттерн. Kirchenbauer и др. (2023) показали, что green-list водяные знаки удаляются на 80% перефразированием. На лексическом уровне достаточно замены синонимами. Защита: семантические водяные знаки (возмущение пространства эмбеддингов), многоуровневые водяные знаки (токен + предложение + абзац), состязательное обучение (детектор на перефразированном тексте)."
    severity: high
  - title:
      tr: "Watermark Spoofing: False Positive Injection"
      en: "Watermark Spoofing: False Positive Injection"
      fr: "Usurpation de filigrane : injection de faux positifs"
      zh: 水印欺骗：误报注入攻击
      ar: "انتحال العلامة المائية: حقن الإيجابيات الكاذبة"
      ru: "Подделка водяного знака: внедрение ложных срабатываний"
    description:
      tr: "Saldırgan, watermark detection algoritmasını reverse engineering yaparak sahte watermark pattern’i insan yazısına enjekte eder. Böylece insan yazısı ‘AI-generated’ olarak işaretlenir (false positive). Bu, özellikle akademik plagiarism detection sistemlerinde tehlikelidir — öğrencinin kendi yazdığı metin AI-generated olarak reddedilebilir. Zhao et al. (2023) bu saldırıyı göstermiştir. Savunma: private watermark key (detection algorithm secret), adaptive watermarking (key rotation), multi-factor detection (watermark + perplexity + stylometry)."
      en: "The attacker reverse engineers the watermark detection algorithm and injects a fake watermark pattern into human writing. This causes human writing to be flagged as 'AI-generated' (false positive). This is especially dangerous in academic plagiarism detection systems — a student's own writing can be rejected as AI-generated. Zhao et al. (2023) demonstrated this attack. Defense: private watermark key (detection algorithm secret), adaptive watermarking (key rotation), multi-factor detection (watermark + perplexity + stylometry)."
      fr: "L’attaquant effectue une rétro-ingénierie de l’algorithme de détection du filigrane et injecte un faux motif dans un texte rédigé par un humain. Le texte humain est alors signalé comme “\_généré par l’IA\_” (faux positif). C’est particulièrement dangereux dans les systèmes de détection de plagiat académique — le propre texte d’un étudiant peut être rejeté. Zhao et al. (2023) ont démontré cette attaque. Défense : clé de filigrane privée, filigranage adaptatif (rotation des clés), détection multifactorielle (filigrane + perplexité + stylométrie)."
      zh: 攻击者对水印检测算法进行逆向工程，并将伪造的水印模式注入人类撰写的文本中。这导致人类文本被标记为“AI生成”（误报）。在学术抄袭检测系统中尤为危险——学生自己的文本可能被判定为AI生成而被拒绝。Zhao等人（2023）已演示此攻击。防御：私有水印密钥、自适应水印（密钥轮换）、多因子检测（水印+困惑度+文体计量学）。
      ar: "يقوم المهاجم بالهندسة العكسية لخوارزمية كشف العلامة المائية ويحقن نمطًا مزيفًا في نص بشري. يؤدي هذا إلى تصنيف النص البشري على أنه “مولّد بالذكاء الاصطناعي” (إيجابي كاذب). هذا خطير في أنظمة كشف الانتحال الأكاديمي — قد يُرفض نص الطالب الأصلي. أثبت Zhao وآخرون (2023) هذا الهجوم. الدفاع: مفتاح علامة مائية خاص، وسم تكيّفي (تدوير المفاتيح)، كشف متعدد العوامل (علامة مائية + حيرة + قياس الأسلوب)."
      ru: "Злоумышленник выполняет реверс-инжиниринг алгоритма обнаружения водяного знака и внедряет поддельный паттерн в текст человека. Текст помечается как “сгенерированный ИИ” (ложное срабатывание). Особенно опасно в системах академического плагиата — собственный текст студента может быть отклонён. Zhao и др. (2023) продемонстрировали эту атаку. Защита: приватный ключ, адаптивное маркирование (ротация ключей), многофакторное обнаружение (водяной знак + перплексия + стилометрия)."
    severity: high
  - title:
      tr: Compression-Based Watermark Degradation
      en: Compression-Based Watermark Degradation
      fr: Dégradation du filigrane par compression
      zh: 基于压缩的水印降解攻击
      ar: تدهور العلامة المائية عبر الضغط
      ru: Деградация водяного знака методом сжатия
    description:
      tr: "Görüntü watermark’leri JPEG compression, resize, blur gibi transformasyonlara karşı savunmasız olabilir. Saldırgan, watermark’lı görüntüyü düşük quality JPEG’e convert edip yeniden upscale ederek watermark pattern’ini bozar. SynthID gibi robust watermark’ler compression’a dayanıklı tasarılanır ama extreme compression (quality < 50) yine de etkilidir. Savunma: robust watermark embedding (frequency domain, not spatial), error correction code (Reed-Solomon), multi-bit watermark (redundancy)."
      en: "Image watermarks can be vulnerable to transformations like JPEG compression, resize, blur. The attacker converts the watermarked image to low-quality JPEG and upscales it again to break the watermark pattern. Robust watermarks like SynthID are designed to resist compression, but extreme compression (quality < 50) is still effective. Defense: robust watermark embedding (frequency domain, not spatial), error correction code (Reed-Solomon), multi-bit watermark (redundancy)."
      fr: "Les filigranes d’image peuvent être vulnérables aux transformations (compression JPEG, redimensionnement, flou). L’attaquant convertit l’image en JPEG basse qualité puis la redimensionne pour briser le motif. Les filigranes robustes comme SynthID résistent à la compression, mais une compression extrême (qualité < 50) reste efficace. Défense : intégration robuste (domaine fréquentiel), code correcteur d’erreurs (Reed-Solomon), filigrane multi-bits (redondance)."
      zh: 图像水印可能容易受到JPEG压缩、缩放、模糊等变换的影响。攻击者将带水印的图像转换为低质量JPEG再放大，以破坏水印模式。SynthID等鲁棒水印可抵抗压缩，但极端压缩（质量<50）仍然有效。防御：鲁棒水印嵌入（频域而非空间域）、纠错码（Reed-Solomon）、多比特水印（冗余）。
      ar: "يمكن أن تكون العلامات المائية للصور عرضة للتحولات كضغط JPEG وتغيير الحجم والتمويه. يحول المهاجم الصورة إلى JPEG منخفض الجودة ثم يعيد تكبيرها لكسر النمط. العلامات المتينة مثل SynthID تقاوم الضغط، لكن الضغط الشديد (جودة < 50) لا يزال فعالًا. الدفاع: تضمين متين (المجال الترددي)، رمز تصحيح أخطاء (Reed-Solomon)، علامة متعددة البتات (تكرار)."
      ru: "Водяные знаки изображений уязвимы к JPEG-сжатию, масштабированию, размытию. Злоумышленник конвертирует изображение в JPEG низкого качества и увеличивает, разрушая паттерн. Устойчивые водяные знаки (SynthID) противостоят сжатию, но экстремальное сжатие (качество < 50) эффективно. Защита: устойчивое встраивание (частотная область), код исправления ошибок (Рида — Соломона), многоразрядный водяной знак (избыточность)."
    severity: medium
  - title:
      tr: Ai Watermarking Konfigürasyon Bilgi Sızıntısı
      en: Ai Watermarking Configuration Information Disclosure
      fr: Divulgation de configuration ai watermarking
      zh: ai watermarking配置信息泄露
      ar: كشف معلومات تكوين ai-watermarking
      ru: Раскрытие конфигурации ai-watermarking
    description:
      tr: Ai Watermarking ile ilgili versiyon, framework ve deployment bilgileri hata mesajlarında veya API yanıtlarında açığa çıkabilir.
      en: Version, framework, and deployment details related to ai watermarking can be exposed in error messages or API responses, aiding targeted attacks.
      fr: Les détails de version et de déploiement liés à ai watermarking peuvent être exposés dans les messages d’erreur ou les réponses API.
      zh: 与ai watermarking相关的版本、框架和部署细节可能在错误消息或API响应中暴露。
      ar: يمكن كشف تفاصيل الإصدار والنشر المتعلقة بـ ai-watermarking في رسائل الخطأ.
      ru: Сведения о версии и развёртывании ai-watermarking могут быть раскрыты в сообщениях об ошибках или ответах API.
    severity: low
config:
  - title: LLM Watermarking with Green-List Token Bias
    lang: python
    code: |-
      import torch
      from transformers import AutoModelForCausalLM, AutoTokenizer
      import hashlib

      model = AutoModelForCausalLM.from_pretrained("meta-llama/Llama-3-8B")
      tokenizer = AutoTokenizer.from_pretrained("meta-llama/Llama-3-8B")

      # Watermark secret key (keep private!)
      WATERMARK_KEY = "my_secret_key_12345"

      def hash_token(prev_token, key):
          """Generate deterministic green-list from previous token"""
          h = hashlib.sha256(f"{prev_token}_{key}".encode()).digest()
          return int.from_bytes(h[:4], 'big')

      def apply_watermark(logits, prev_token, delta=2.0):
          """Apply green-list watermark: boost probability of green tokens"""
          vocab_size = logits.shape[-1]
          hash_val = hash_token(prev_token, WATERMARK_KEY)

          # Green-list: tokens with hash % 2 == 0
          green_list = [(hash_val + i) % vocab_size for i in range(vocab_size // 2)]

          # Boost green token logits
          for token_id in green_list:
              logits[0, token_id] += delta

          return logits

      def generate_with_watermark(prompt, max_tokens=100):
          inputs = tokenizer(prompt, return_tensors="pt")
          prev_token = inputs.input_ids[0, -1].item()

          for _ in range(max_tokens):
              with torch.no_grad():
                  outputs = model(**inputs)
                  logits = outputs.logits[:, -1, :]

              # Apply watermark
              logits = apply_watermark(logits, prev_token)

              # Sample next token
              probs = torch.softmax(logits, dim=-1)
              next_token = torch.multinomial(probs, 1)

              inputs.input_ids = torch.cat([inputs.input_ids, next_token], dim=-1)
              prev_token = next_token.item()

          return tokenizer.decode(inputs.input_ids[0], skip_special_tokens=True)

      watermarked_text = generate_with_watermark("Explain quantum mechanics")
    description:
      tr: "LLM watermarking: green-list token bias yöntemi ile kriptografik watermark enjekte edilir — detection için aynı secret key gerekir."
      en: "LLM watermarking: cryptographic watermark injected via green-list token bias method — same secret key required for detection."
  - title: Watermark Detection with Z-Score Analysis
    lang: python
    code: |-
      import torch
      from transformers import AutoTokenizer

      tokenizer = AutoTokenizer.from_pretrained("meta-llama/Llama-3-8B")
      WATERMARK_KEY = "my_secret_key_12345"

      def detect_watermark(text, threshold=2.0):
          """Detect watermark via green-token frequency analysis"""
          tokens = tokenizer.encode(text)
          green_count = 0

          for i in range(1, len(tokens)):
              prev_token = tokens[i-1]
              curr_token = tokens[i]

              hash_val = hash_token(prev_token, WATERMARK_KEY)
              vocab_size = tokenizer.vocab_size
              green_list = [(hash_val + j) % vocab_size for j in range(vocab_size // 2)]

              if curr_token in green_list:
                  green_count += 1

          # Z-score: (observed - expected) / std
          expected = len(tokens) * 0.5  # 50% should be green by chance
          std = (len(tokens) * 0.5 * 0.5) ** 0.5
          z_score = (green_count - expected) / std

          if z_score > threshold:
              return True, f"Watermark detected (z-score={z_score:.2f})"
          return False, f"No watermark (z-score={z_score:.2f})"

      is_watermarked, msg = detect_watermark(watermarked_text)
      print(msg)
    description:
      tr: "Watermark detection: green-token frekansı Z-score analizi ile tespit edilir — threshold > 2.0 ise watermark var demektir."
      en: "Watermark detection: green-token frequency detected via Z-score analysis — if threshold > 2.0, watermark exists."
  - title: Watermark Integrity Validator
    lang: rust
    code: |-
      use sha2::{Sha256, Digest};
      use std::fs;

      pub struct WatermarkValidator {
          secret_key: Vec<u8>,
      }

      impl WatermarkValidator {
          pub fn new(key: &[u8]) -> Self {
              Self { secret_key: key.to_vec() }
          }

          pub fn validate_text(&self, text: &str) -> bool {
              let tokens: Vec<&str> = text.split_whitespace().collect();
              let mut green_count = 0;
              for token in &tokens {
                  let mut hasher = Sha256::new();
                  hasher.update(&self.secret_key);
                  hasher.update(token.as_bytes());
                  let hash = hasher.finalize();
                  if hash[0] & 1 == 1 { green_count += 1; }
              }
              let ratio = green_count as f64 / tokens.len() as f64;
              ratio > 0.65 // Threshold for watermark detection
          }
      }
    description:
      tr: Watermark dogrulama icin Rust modulu.
      en: Rust module for watermark integrity validation.
