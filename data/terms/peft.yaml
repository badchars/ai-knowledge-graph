tips:
  - tr: Production'da Hugging Face Hub'dan adapter yüklerken mutlaka model card'ı oku ve author reputation'ını kontrol et — popüler modeller bile poisoned adapter içerebilir.
    en: When loading adapters from Hugging Face Hub in production, always read the model card and check author reputation — even popular models can contain poisoned adapters.
  - tr: Multi-tenant serving yapıyorsan vLLM'de --enforce-eager kullan — CUDA graph caching cross-tenant residual activation sızıntısına neden olabilir.
    en: If doing multi-tenant serving, use --enforce-eager in vLLM — CUDA graph caching can cause cross-tenant residual activation leakage.
  - tr: Prefix Tuning yerine LoRA tercih et — prefix'ler embedding space'de dense vector olduğu için gradient leakage riski daha yüksek.
    en: Prefer LoRA over Prefix Tuning — prefixes are dense vectors in embedding space, making gradient leakage risk higher.
