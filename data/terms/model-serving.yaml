tips:
  - tr: Her model yüklemesinde cryptographic signature verification yapın.
    en: Perform cryptographic signature verification on every model load.
  - tr: Rate limiting ve request throttling ile abuse'ı önleyin, per-client quota belirleyin.
    en: Prevent abuse with rate limiting and request throttling, set per-client quota.
  - tr: Health check endpoint'lerinde internal detayları leak etmeyin, sadece status dönün.
