tips:
  - tr: TPU Pod kullanırken mutlaka private VPC ile izole edin, public endpoint kullanmayın.
    en: Always isolate TPU Pods with private VPC - never use public endpoints.
  - tr: XLA'ya custom op gönderirken input validation yapın, malicious code injection'ı önleyin.
    en: Validate input when sending custom ops to XLA to prevent malicious code injection.
  - tr: Cloud TPU firmware güncellemelerini takip edin, Google'ın security bulletin'lerini düzenli kontrol edin.
    en: Track Cloud TPU firmware updates and regularly check Google's security bulletins.
