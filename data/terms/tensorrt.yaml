tips:
  - tr: TensorRT engine build süreci uzun (10-60 dakika), mutlaka cache'leyin — production'da her başlangıçta rebuild etmeyin.
    en: TensorRT engine build process is long (10-60 minutes), always cache — don't rebuild on every startup in production.
  - tr: INT8 quantization için calibration dataset kullanın — accuracy drop minimal (%1-2) ama inference 3-5x hızlanır.
    en: Use calibration dataset for INT8 quantization — accuracy drop is minimal (1-2%) but inference speeds up 3-5x.
  - tr: Engine dosyalarını SHA256 hash ile integrity check yapın — supply chain attack'e karşı savunma.
    en: Integrity check engine files with SHA256 hash — defense against supply chain attacks.
