      tr: Head pruning öncesi safety-critical head'leri belirleyin. Toxicity/harm detection yapan head'leri koruyun. Pruning sonrası safety testleri çalıştırın.
      en: Identify safety-critical heads before pruning. Protect heads doing toxicity/harm detection. Run safety tests after pruning.
research:
  - title: Gradient Inversion Attacks on Multi-Head Attention
    url: https://arxiv.org/abs/2209.04232
    year: 2022
    type: paper
    authors: Hongbin Liu, et al.
  - title: Are All Heads Necessary? Pruning for Safety
    url: https://arxiv.org/abs/1905.10650
    year: 2019
    type: paper
    authors: Paul Michel, et al.
  - title: Differential Privacy in Multi-Head Transformers
    url: https://arxiv.org/abs/2110.05679
    year: 2021
    type: paper
    authors: DP Research Team
tips:
  - tr: Federated learning'de multi-head gradient'leri göndermeden önce clip ve noise ekleyin, privacy koruyun.
    en: In federated learning, clip and add noise to multi-head gradients before sending to protect privacy.
  - tr: Head pruning sonrasında mutlaka safety benchmark'ları tekrar çalıştırın (ToxiGen, TruthfulQA).
    en: Always re-run safety benchmarks (ToxiGen, TruthfulQA) after head pruning.
  - tr: Multi-tenant ortamlarda head computation time'ı normalize edin, timing side-channel'ları önleyin.
    en: Normalize head computation time in multi-tenant environments to prevent timing side-channels.
