tips:
  - tr: Fine-tuning sonrası mutlaka safety benchmark'ları (ToxiGen, BBQ) tekrar çalıştırın.
    en: Always re-run safety benchmarks (ToxiGen, BBQ) after fine-tuning.
  - tr: Fine-tuning dataset'ini GitHub/public web'e asla koymayın, proprietary data leak eder.
    en: Never put fine-tuning dataset on GitHub/public web - leaks proprietary data.
  - tr: LoRA adapter'ları şifreleyerek saklayın, adapter poisoning'i önleyin.
    en: Store LoRA adapters encrypted to prevent adapter poisoning.
