tips:
  - tr: Network monitoring ile shadow AI kullanımını tespit edin — chat.openai.com, claude.ai gibi domain'lere anormal trafik analiz edin.
    en: Detect shadow AI usage with network monitoring — analyze abnormal traffic to domains like chat.openai.com and claude.ai.
  - tr: Çalışanlara approved AI tools sunun (Azure OpenAI, on-prem LLM) — shadow AI'ın ana sebebi authorized alternatif olmamasıdır.
    en: Provide employees with approved AI tools (Azure OpenAI, on-prem LLM) — main reason for shadow AI is lack of authorized alternatives.
  - tr: API key scanning ile repository'lerde OpenAI/Anthropic key'lerini detect edin — GitHub secret scanning, GitGuardian kullanın.
    en: Detect OpenAI/Anthropic keys in repositories with API key scanning — use GitHub secret scanning or GitGuardian.
