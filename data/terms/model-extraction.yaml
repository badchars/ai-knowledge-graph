tips:
  - tr: API'nizden logprobs, token probabilities gibi model internal'larını döndürmeyin. Bu bilgiler extraction'ı kolaylaştırır.
    en: Don't return model internals like logprobs, token probabilities from your API. This information facilitates extraction.
  - tr: Query pattern anomaly detection yapın. Bir kullanıcı saatte 1000+ benzer query yapıyorsa model extraction olabilir.
    en: Perform query pattern anomaly detection. If a user makes 1000+ similar queries per hour, it may be model extraction.
  - tr: Model output'larına watermark ekleyin. Çalıntı model tespit edildiğinde orijinal sahipliği kanıtlayabilirsiniz.
    en: Add watermarks to model outputs. When a stolen model is detected, you can prove original ownership.
