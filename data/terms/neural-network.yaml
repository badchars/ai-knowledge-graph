tips:
  - tr: Third-party pretrained model kullanırken backdoor detection yapın. Activation clustering ve neural cleanse gibi teknikler backdoor tespit edebilir.
    en: Perform backdoor detection when using third-party pretrained models. Techniques like activation clustering and neural cleanse can detect backdoors.
  - tr: Sensitive data ile eğitim yaparken differential privacy (DP-SGD) kullanın. Privacy budget (epsilon) değerini 1-10 arasında tutun.
    en: Use differential privacy (DP-SGD) when training with sensitive data. Keep privacy budget (epsilon) value between 1-10.
