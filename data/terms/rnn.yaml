tips:
  - tr: Uzun sequence'larda LSTM/GRU kullanın, vanishing gradient problemi nedeniyle klasik RNN yetersiz kalır.
    en: Use LSTM/GRU for long sequences — classic RNN fails due to vanishing gradient problem.
  - tr: RNN'ler transformer'lardan çok daha yavaştır (paralelize edilemez). Eğer sequence uzunsa ve hız önemliyse transformer tercih edin.
    en: RNNs are much slower than transformers (can't be parallelized). If sequences are long and speed matters, prefer transformers.
  - tr: Gradient clipping kullanın (torch.nn.utils.clip_grad_norm_) — RNN eğitiminde exploding gradient'leri önler.
    en: Use gradient clipping (torch.nn.utils.clip_grad_norm_) — prevents exploding gradients in RNN training.
