tips:
  - tr: ONNX export sonrası mutlaka model validation yapın — onnx.checker.check_model() ile graph integrity kontrol edin.
    en: Always validate model after ONNX export — check graph integrity with onnx.checker.check_model().
  - tr: Production'da ONNX Runtime yerine TensorRT kullanın — NVIDIA GPU'larda 2-5x daha hızlı inference, INT8 quantization desteği.
    en: In production, use TensorRT instead of ONNX Runtime — 2-5x faster inference on NVIDIA GPUs, INT8 quantization support.
  - tr: Custom operator içeren ONNX modellerini untrusted source'dan yüklemeyin — arbitrary code execution riski var.
    en: Don't load ONNX models with custom operators from untrusted sources — arbitrary code execution risk exists.
