tips:
  - tr: Untrusted source'dan model indirirken MUTLAKA weights_only=True kullanın veya SafeTensors formatını tercih edin.
    en: When downloading models from untrusted sources, ALWAYS use weights_only=True or prefer SafeTensors format.
  - tr: Production'da torch.compile() ile model'i optimize edin — 2-3x inference speedup, ama ilk çalıştırmada compile overhead var.
    en: In production, optimize model with torch.compile() — 2-3x inference speedup, but first run has compile overhead.
  - tr: GPU memory yetersizse gradient_checkpointing + mixed precision (torch.cuda.amp) kombine edin, VRAM kullanımını yarıya indirir.
    en: If GPU memory is insufficient, combine gradient_checkpointing + mixed precision (torch.cuda.amp), reduces VRAM usage by half.
