tips:
  - tr: Multi-tenant GPU ortamlarında her zaman encrypted VRAM kullanın, NVIDIA Confidential Computing destekli kartları tercih edin.
    en: In multi-tenant GPU environments, always use encrypted VRAM - prefer NVIDIA Confidential Computing enabled cards.
  - tr: Model inference sonrası KV cache'i cudaMemset ile sıfırlayın, önceki prompt'ların kalıntılarını temizleyin.
    en: After model inference, zero out KV cache with cudaMemset to clear remnants of previous prompts.
  - tr: VRAM kullanımını nvidia-smi ile sürekli izleyin, beklenmedik artışlar memory leak veya saldırı işareti olabilir.
    en: Continuously monitor VRAM usage with nvidia-smi - unexpected spikes may indicate memory leaks or attacks.
