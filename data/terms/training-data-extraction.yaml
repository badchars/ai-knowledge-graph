tips:
  - tr: Egitim verinizde deduplication yapin. Tekrar eden veriler memorization riskini katlanarak artirir. MinHash ile 13-gram near-duplicate tespiti yapin.
    en: Perform deduplication on your training data. Repeated data exponentially increases memorization risk. Use MinHash with 13-gram near-duplicate detection.
    fr: Effectuez la deduplication de vos donnees d'entrainement. Les donnees repetees augmentent exponentiellement le risque de memorisation. Utilisez MinHash avec la detection de quasi-doublons par 13-grammes.
    zh: 对训练数据进行去重。重复数据会指数级增加记忆化风险。使用MinHash进行13-gram近似重复检测。
    ar: قم بازالة التكرار من بيانات التدريب. البيانات المتكررة تزيد مخاطر الحفظ بشكل متسارع. استخدم MinHash مع اكتشاف شبه التكرار بـ 13-gram.
    ru: Выполняйте дедупликацию обучающих данных. Повторяющиеся данные экспоненциально увеличивают риск меморизации. Используйте MinHash с обнаружением near-duplicate по 13-граммам.
  - tr: Sensitive data ile model egitiyorsaniz differential privacy (DP-SGD) kullanin. Epsilon degerini 1-10 arasinda tutun -- dusuk epsilon daha guclu privacy ama daha dusuk model kalitesi demektir.
    en: Use differential privacy (DP-SGD) when training models with sensitive data. Keep epsilon value between 1-10 -- lower epsilon means stronger privacy but lower model quality.
    fr: Utilisez la confidentialite differentielle (DP-SGD) lors de l'entrainement de modeles avec des donnees sensibles. Gardez la valeur d'epsilon entre 1-10 -- un epsilon plus faible signifie une confidentialite plus forte mais une qualite de modele inferieure.
    zh: 使用敏感数据训练模型时使用差分隐私（DP-SGD）。将epsilon值保持在1-10之间——较低的epsilon意味着更强的隐私保护但较低的模型质量。
    ar: استخدم الخصوصية التفاضلية (DP-SGD) عند تدريب النماذج ببيانات حساسة. حافظ على قيمة epsilon بين 1-10 -- epsilon اقل يعني خصوصية اقوى لكن جودة نموذج اقل.
    ru: Используйте дифференциальную приватность (DP-SGD) при обучении моделей на чувствительных данных. Держите epsilon в диапазоне 1-10 -- меньший epsilon означает более сильную приватность, но более низкое качество модели.
  - tr: "Post-training memorization audit yapin: canary insertion ile bilinen metinlerin extraction'a karsi direncini test edin. Modeli deploy etmeden once memorization score'u kabul edilebilir seviyede olmali."
    en: "Perform post-training memorization audits: test extraction resistance of known texts via canary insertion. Memorization score should be at an acceptable level before deploying the model."
    fr: "Effectuez des audits de memorisation apres l'entrainement : testez la resistance a l'extraction de textes connus par insertion canari. Le score de memorisation doit etre a un niveau acceptable avant de deployer le modele."
    zh: 执行训练后记忆化审计：通过金丝雀插入测试已知文本的提取抗性。在部署模型之前，记忆化分数应处于可接受的水平。
    ar: "قم بمراجعة الحفظ بعد التدريب: اختبر مقاومة الاستخراج للنصوص المعروفة عبر ادخال الكناري. يجب ان تكون درجة الحفظ عند مستوى مقبول قبل نشر النموذج."
    ru: "Проводите аудит меморизации после обучения: тестируйте устойчивость к извлечению известных текстов через вставку канареек. Показатель меморизации должен быть на приемлемом уровне перед деплоем модели."
  - tr: Egitim verinizden PII'yi (kisisel bilgileri) egitim oncesinde temizleyin. E-posta, telefon, SSN gibi pattern'leri regex ile tespit edip redact edin. Temizlenmemis PII en yuksek memorization riski tasir.
    en: Scrub PII (personal information) from your training data before training. Detect and redact patterns like email, phone, SSN with regex. Unscrubbed PII carries the highest memorization risk.
    fr: Nettoyez les PII (informations personnelles) de vos donnees d'entrainement avant l'entrainement. Detectez et masquez les modeles comme les e-mails, telephones, SSN avec des regex. Les PII non nettoyees presentent le risque de memorisation le plus eleve.
    zh: 在训练之前从训练数据中清除PII（个人信息）。使用正则表达式检测和编辑电子邮件、电话、SSN等模式。未清理的PII具有最高的记忆化风险。
    ar: نظف المعلومات الشخصية (PII) من بيانات التدريب قبل التدريب. اكتشف وامسح الانماط مثل البريد الالكتروني والهاتف و SSN باستخدام التعبيرات النمطية. المعلومات الشخصية غير المنظفة تحمل اعلى مخاطر الحفظ.
    ru: Очищайте PII (персональные данные) из обучающих данных до обучения. Обнаруживайте и редактируйте паттерны email, телефонов, SSN с помощью regex. Неочищенные PII несут наивысший риск меморизации.
