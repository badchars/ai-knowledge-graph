    year: 2024
    type: paper
    authors: Tianle Cai, Yuhong Li, Zhengyang Geng, Hongwu Peng, Tri Dao
tips:
  - tr: Draft model'i target model ile aynı security posture'da tutun (same trust level).
    en: Keep draft model at same security posture as target model (same trust level).
  - tr: Speculative decoding acceptance rate'i monitör edin; düşük rate attack göstergesi olabilir.
    en: Monitor speculative decoding acceptance rate; low rates can indicate attacks.
