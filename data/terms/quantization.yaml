tips:
  - tr: Quantization öncesi ve sonrası model davranışını test setinde mutlaka karşılaştırın.
    en: Always compare model behavior before and after quantization on test sets.
  - tr: GGUF gibi standart formatlar kullanın ve metadata'yı doğrulayın.
    en: Use standard formats like GGUF and verify metadata.
  - tr: Quantization parametrelerini (bit width, calibration data) log edin ve versiyonlayın.
    en: Log and version quantization parameters (bit width, calibration data).
