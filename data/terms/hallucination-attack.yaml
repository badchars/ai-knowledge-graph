tips:
  - tr: LLM'in önerdiği her paketi yüklemeden önce registry'de var olduğunu doğrulayın — otomatik doğrulama pipeline'ına entegre edin.
    en: Verify every LLM-suggested package exists in the registry before installing — integrate into an automated verification pipeline.
    fr: Verifiez que chaque paquet suggere par le LLM existe dans le registre avant l'installation — integrez dans un pipeline de verification automatise.
    zh: 在安装前验证每个LLM建议的包是否存在于注册表中——集成到自动验证管道中。
    ar: تحقق من وجود كل حزمة يقترحها نموذج اللغة الكبير في السجل قبل التثبيت — ادمج في خط أنابيب التحقق التلقائي.
    ru: Проверяйте существование каждого предложенного LLM пакета в реестре перед установкой — интегрируйте в автоматизированный конвейер проверки.
  - tr: LLM'in ürettiği akademik referansları DOI veya CrossRef ile doğrulayın — sahte citation'ları otomatik flagleyin.
    en: Verify academic references generated by LLM via DOI or CrossRef — automatically flag fake citations.
    fr: Verifiez les references academiques generees par le LLM via DOI ou CrossRef — signalez automatiquement les fausses citations.
    zh: 通过DOI或CrossRef验证LLM生成的学术引用——自动标记虚假引文。
    ar: تحقق من المراجع الأكاديمية المولدة من نموذج اللغة الكبير عبر DOI أو CrossRef — أشر تلقائياً للاستشهادات المزيفة.
    ru: Проверяйте академические ссылки, сгенерированные LLM, через DOI или CrossRef — автоматически помечайте поддельные цитаты.
  - tr: Kod üretiminde SAST (Static Application Security Testing) araçlarını otomatik çalıştırın — LLM'in ürettiği kodu production'a almadan önce tarayın.
    en: Automatically run SAST tools on code generation — scan LLM-generated code before deploying to production.
    fr: Executez automatiquement des outils SAST sur le code genere — analysez le code genere par le LLM avant le deploiement en production.
    zh: 在代码生成时自动运行SAST工具——在部署到生产环境之前扫描LLM生成的代码。
    ar: شغل أدوات SAST تلقائياً على الكود المولد — افحص الكود المولد من نموذج اللغة الكبير قبل نشره في الإنتاج.
    ru: Автоматически запускайте SAST-инструменты при генерации кода — сканируйте код, сгенерированный LLM, перед развёртыванием в production.
  - tr: LLM çıktılarına 'confidence score' ekleyin ve düşük güvenilirlikli yanıtları kullanıcıya açıkça işaretleyin.
    en: Add confidence scores to LLM outputs and clearly mark low-confidence responses for the user.
    fr: Ajoutez des scores de confiance aux sorties LLM et marquez clairement les reponses a faible confiance pour l'utilisateur.
    zh: 为LLM输出添加置信度分数，并为用户明确标记低置信度回答。
    ar: أضف درجات ثقة لمخرجات نموذج اللغة الكبير وأشر بوضوح للاستجابات منخفضة الثقة للمستخدم.
    ru: Добавляйте оценки уверенности к выводу LLM и чётко помечайте ответы с низкой уверенностью для пользователя.
