tips:
  - tr: Banking app'lerde selfie-based KYC yaparken mutlaka 3D liveness detection kullan — 2D deepfake video replay saldırısını engellemez.
    en: When doing selfie-based KYC in banking apps, always use 3D liveness detection — doesn't prevent 2D deepfake video replay attacks.
  - tr: CEO'dan gelen acil para transferi talimatlarını mutlaka out-of-band (SMS/email) ile doğrula — voice cloning çok kolay hale geldi.
    en: Always verify urgent money transfer instructions from the CEO out-of-band (SMS/email) — voice cloning has become very easy.
  - tr: Sosyal medyada viral olan politik video'ları reverse image search (TinEye, Google Lens) ile kontrol et — deepfake olup olmadığını anlamak için.
    en: Check viral political videos on social media with reverse image search (TinEye, Google Lens) — to determine if they are deepfakes.
