  - title: Voice Deepfake Detection Model
    lang: python
    code: |-
      import torch
      import torchaudio
      from transformers import Wav2Vec2Model, Wav2Vec2Processor

      # Load pre-trained Wav2Vec2 for feature extraction
      processor = Wav2Vec2Processor.from_pretrained("facebook/wav2vec2-base")
      model = Wav2Vec2Model.from_pretrained("facebook/wav2vec2-base")

      # Binary classifier: real vs deepfake
      class VoiceDeepfakeDetector(torch.nn.Module):
          def __init__(self):
              super().__init__()
              self.wav2vec = model
              self.classifier = torch.nn.Linear(768, 2)  # 768 = Wav2Vec2 hidden size

          def forward(self, audio):
              features = self.wav2vec(audio).last_hidden_state
              pooled = features.mean(dim=1)  # mean pooling
              logits = self.classifier(pooled)
              return logits

      detector = VoiceDeepfakeDetector()

      # Load pre-trained weights (train on ASVspoof/FakeAVCeleb dataset)
      detector.load_state_dict(torch.load("./voice_deepfake_detector.pth"))

      def detect_voice_deepfake(audio_path):
          waveform, sample_rate = torchaudio.load(audio_path)
          inputs = processor(waveform.squeeze(), sampling_rate=sample_rate, return_tensors="pt")

          with torch.no_grad():
              logits = detector(inputs.input_values)
              pred = torch.argmax(logits, dim=-1).item()

          if pred == 1:
              return True, "Deepfake voice detected"
          return False, "Real voice"

      is_fake, msg = detect_voice_deepfake("./ceo_call.wav")
    description:
      tr: "Voice deepfake detection: Wav2Vec2 feature extraction + binary classifier ile gerçek vs deepfake ses ayırt edilir (ASVspoof dataset ile eğitilmiş)."
      en: "Voice deepfake detection: Wav2Vec2 feature extraction + binary classifier distinguishes real vs deepfake voice (trained on ASVspoof dataset)."
  - title: Deepfake Detection API
    lang: dockerfile
    code: |-
      FROM python:3.11-slim
      RUN apt-get update && apt-get install -y --no-install-recommends ffmpeg && rm -rf /var/lib/apt/lists/*
      RUN groupadd -r detector && useradd -r -g detector detector
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt
      COPY --chown=detector:detector . .
      USER detector
      EXPOSE 8080
      HEALTHCHECK --interval=30s CMD curl -f http://localhost:8080/health || exit 1
      ENTRYPOINT ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    description:
      tr: Deepfake tespiti API icin guvenli Docker.
      en: Secure Docker for deepfake detection API.
