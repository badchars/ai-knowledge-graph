tips:
  - tr: Alignment'ı tek bir RLHF aşamasına bırakmayın. Constitutional AI gibi çok katmanlı kontrol mekanizmaları kullanın.
    en: Don't rely on a single RLHF stage for alignment. Use multi-layered control mechanisms like Constitutional AI.
  - tr: Red-teaming ekibi kurun ve sürekli yeni jailbreak teknikleri test edin. Alignment sürekli güncellenmelidir.
    en: Establish a red-teaming team and continuously test new jailbreak techniques. Alignment must be continuously updated.
