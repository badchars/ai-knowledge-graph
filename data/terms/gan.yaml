tips:
  - tr: GAN eğitirken discriminator'ı generator'dan hafif güçlü tutun (learning rate ayarı). Çok güçlü discriminator generator'ın öğrenmesini engeller.
    en: Keep discriminator slightly stronger than generator when training GANs (learning rate tuning). Too strong discriminator prevents generator learning.
  - tr: Mode collapse fark ettiğinizde (generator hep aynı şeyi üretir) learning rate'i düşürün veya WGAN gibi stabilize edilmiş variant kullanın.
    en: When you notice mode collapse (generator always produces same output), reduce learning rate or use stabilized variants like WGAN.
  - tr: Production deepfake detection için FaceForensics++ veri seti ile fine-tune edilmiş CNN modelleri kullanın. GAN-generated content detection kritik güvenlik konusu.
    en: For production deepfake detection, use CNN models fine-tuned on FaceForensics++ dataset. GAN-generated content detection is a critical security issue.
