tips:
  - tr: Model integrity için SHA256 hash check kullanın ve secure storage'da saklayın.
    en: Use SHA256 hash check for model integrity and store in secure storage.
  - tr: Quantization ve pruning ile model boyutunu küçültün, accuracy loss'u benchmark'layın.
    en: Reduce model size with quantization and pruning, benchmark accuracy loss.
  - tr: Secure boot ve code signing ile firmware tampering'i engelleyin.
    en: Prevent firmware tampering with secure boot and code signing.
