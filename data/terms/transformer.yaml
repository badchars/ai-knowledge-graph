tips:
  - tr: Production'da logprobs ve top_logprobs parametrelerini mutlaka kapat — softmax çıktıları model mimarisini ve eğitim verisini reverse engineering'e açar.
    en: Always disable logprobs and top_logprobs in production — softmax outputs expose model architecture and training data to reverse engineering.
  - tr: Multi-tenant serving'de prefix caching'i kapat veya tenant-level hash doğrulaması uygula — paylaşımlı KV-cache cross-tenant veri sızıntısı riski taşır.
    en: Disable prefix caching in multi-tenant serving or apply tenant-level hash verification — shared KV-cache carries cross-tenant data leakage risk.
  - tr: System prompt'u her zaman token dizisinin başına koy ve context window dolduğunda user input'u kırp, system prompt'u asla kırpma.
    en: Always place the system prompt at the beginning of the token sequence and truncate user input when the context window fills up — never truncate the system prompt.
  - tr: Eğitim verisinde deduplication uygula — tekrar eden veriler attention ağırlıklarında daha yüksek skor alır ve memorization riskini artırır.
    en: Apply deduplication to training data — repeated data scores higher in attention weights and increases memorization risk.
