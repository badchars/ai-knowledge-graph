tips:
  - tr: Federated learning'de gradient clipping ve gürültü ekleme mutlaka kullanın.
    en: Always use gradient clipping and noise addition in federated learning.
  - tr: Gradient güncellemelerini secure aggregation protokolleri ile şifreleyin.
    en: Encrypt gradient updates using secure aggregation protocols.
  - tr: Client'lardan gelen gradientleri istatistiksel anomali tespiti ile kontrol edin.
    en: Validate client gradients using statistical anomaly detection.
