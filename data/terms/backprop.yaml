tips:
  - tr: Fine-tuning sırasında gradient norm'larını log edin ve anomalileri tespit edin.
    en: Log gradient norms during fine-tuning and detect anomalies.
  - tr: Backpropagation hesaplamalarını constant-time implementation ile yaparak timing side-channel'ı önleyin.
    en: Use constant-time implementations for backpropagation to prevent timing side-channels.
