tips:
  - tr: Hugging Face Hub'dan model indirirken mutlaka author reputation kontrol et ve checksum doğrulaması yap — popüler model'ler bile backdoor içerebilir.
    en: When downloading models from Hugging Face Hub, always check author reputation and perform checksum validation — even popular models can contain backdoors.
  - tr: Fine-tuning yaptıktan sonra activation clustering ile test et — backdoor trigger'lar genellikle activation space'de ayrı cluster oluşturur.
    en: After fine-tuning, test with activation clustering — backdoor triggers typically form separate clusters in activation space.
  - tr: Custom tokenizer kullanıyorsan vocabulary'ye eklenen yeni token'ları manuel olarak review et — backdoor trigger özel token olarak eklenebilir.
    en: If using a custom tokenizer, manually review new tokens added to the vocabulary — backdoor triggers can be added as special tokens.
