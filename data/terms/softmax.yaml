tips:
  - tr: LLM inference'ta creative task için temperature=1.2-1.5, factual task için temperature=0.3-0.7 kullanın.
    en: For LLM inference, use temperature=1.2-1.5 for creative tasks, temperature=0.3-0.7 for factual tasks.
  - tr: Softmax numerically unstable olabilir (overflow). PyTorch/TensorFlow otomatik stabilize eder ama manuel implementasyonda log-softmax kullanın.
    en: Softmax can be numerically unstable (overflow). PyTorch/TensorFlow auto-stabilize but use log-softmax in manual implementations.
  - tr: Büyük vocabulary (50K+ token) ile çalışırken softmax yavaş olur. Top-k veya nucleus (top-p) sampling kullanarak hesaplama maliyetini azaltın.
    en: With large vocabulary (50K+ tokens), softmax becomes slow. Use top-k or nucleus (top-p) sampling to reduce computation cost.
