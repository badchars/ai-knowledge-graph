tips:
  - tr: Multi-tenant ortamlarda Tensor Core kullanımını izleyin, beklenmedik spike'lar side-channel saldırısı işareti olabilir.
    en: Monitor Tensor Core usage in multi-tenant environments - unexpected spikes may indicate side-channel attacks.
  - tr: Transformer Engine kullanırken FP8 scaling factors'ı randomize edin, pattern-based information leakage'ı önleyin.
    en: Randomize FP8 scaling factors when using Transformer Engine to prevent pattern-based information leakage.
  - tr: Kritik modellerde TF32'yi kapatın ve FP32 kullanın, precision loss'tan kaynaklanan güvenlik risklerini azaltın.
    en: Disable TF32 and use FP32 for critical models to reduce security risks from precision loss.
