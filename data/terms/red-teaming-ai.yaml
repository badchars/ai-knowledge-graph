tips:
  - tr: Red-teaming'i sürekli bir süreç yapın. Her model güncellemesinde yeni saldırı vektörleri test edin.
    en: Make red-teaming a continuous process. Test new attack vectors with every model update.
  - tr: Başarılı jailbreak'leri RLHF training data'sına ekleyin. Model, red-team tarafından keşfedilen saldırılardan öğrenmeli.
    en: Add successful jailbreaks to RLHF training data. The model should learn from attacks discovered by red-team.
