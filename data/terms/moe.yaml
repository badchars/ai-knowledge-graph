tips:
  - tr: MoE router logits'e training sırasında noise ekleyin, adversarial manipulation'ı zorlaştırın.
    en: Add noise to MoE router logits during training to make adversarial manipulation harder.
  - tr: Expert routing pattern'lerini API'den expose etmeyin, model architecture bilgisi sızdırır.
    en: Don't expose expert routing patterns from API - leaks model architecture information.
  - tr: Load balancing loss weight'ini düşük tutun, quality kaybını önleyin.
    en: Keep load balancing loss weight low to prevent quality degradation.
